          <div style="text-align:right;">
            <div style="font-size:11px;color:var(--mut);">${totalG}g tot</div>
            <div style="font-size:12px;font-weight:700;color:${diffCol};">${diffText}</div>
          </div>
        </div>
      </div>

      <!-- Lista cibi attuale -->
      ${draft.length>0?`<div style="margin-bottom:14px;">
        ${draft.map((it,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surf);border:1px solid var(--bord);border-radius:10px;margin-bottom:6px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:600;color:var(--text);">${escapeHtml(it.name)}</div>
            <div style="font-size:11px;color:var(--mut);">${it.grams}g · ${it.kcal} kcal</div>
          </div>
          <button class="btn-s" style="background:var(--red);color:#fff;padding:6px 10px;font-size:11px;" onclick="removeCustomMealItem(${i})">✕</button>
        </div>`).join('')}
      </div>`:`<div style="text-align:center;padding:16px;font-size:12px;color:var(--mut);">Nessun cibo aggiunto. Inserisci almeno 1 cibo sotto.</div>`}

      <!-- Form nuovo cibo -->
      <div style="background:rgba(167,139,250,.06);border:1.5px solid var(--purp);border-radius:12px;padding:12px;margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--purp);letter-spacing:1px;margin-bottom:8px;">+ AGGIUNGI CIBO</div>
        <input id="cmName" type="text" maxlength="80" placeholder="Nome cibo (es. Pasta al sugo)" style="margin-bottom:8px;font-size:14px;padding:10px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <input id="cmGrams" type="number" min="1" max="2000" placeholder="Grammi" style="margin:0;font-size:14px;padding:10px;text-align:center;">
          <input id="cmKcal" type="number" min="1" max="3000" placeholder="Kcal tot" style="margin:0;font-size:14px;padding:10px;text-align:center;">
        </div>
        <button class="btn-s" style="background:var(--purp);color:#fff;width:100%;padding:10px;font-size:13px;" onclick="addCustomMealItem()">+ Aggiungi al pasto</button>
      </div>

      <!-- Azioni -->
      <div style="display:flex;gap:8px;">
        <button class="btn btn-action" style="flex:1;padding:12px;" onclick="closeSheet()">ANNULLA</button>
        <button class="btn" style="flex:1;padding:12px;" onclick="saveCustomMeal()">SALVA</button>
      </div>
      <div style="font-size:10px;color:var(--mut);text-align:center;margin-top:10px;line-height:1.4;">💡 Se lasci vuoto il pasto e salvi, torni ai consigli automatici.</div>
    </div></div>`;
  })():
  // PUNTO 18: editor scheda personalizzata
  ST.sheet==='customWorkout'&&ST.sheetData?(()=>{
    const d=ST.sheetData;
    const draft=d.draft;
    const vol=estimateWorkoutVolume(draft);
    const minVolByFocus={total:8,upper:6,lower:6,glutes:5,hyp:10,strength:5};
    const minVol=minVolByFocus[ST.p.focus]||6;
    const volCol=vol.totalSets>=minVol?'var(--acc)':'var(--yel)';
    const emojis=['🛠️','💪','🏋️','🦵','🤸','⚡','🔱','🔥','🍑','🦾','💥'];
    // Sub-sheet: creazione esercizio custom
    if(d.subSheet==='customEx'){
      const sr=getSetsReps('compound',ST.p.t||'cut',pwk(ST.programStart),ST.p.focus||'total');
      return`<div class="sh-ov" onclick="if(event.target===this)closeSheet()"><div class="sh"><div class="sh-h"></div>
        <div class="bebas" style="font-size:22px;margin-bottom:14px;">+ NUOVO ESERCIZIO PERSONALIZZATO</div>
        <span class="lbl">NOME ESERCIZIO</span>
        <input id="cwExName" type="text" maxlength="60" placeholder="Es. Alzate cinesi" style="margin-bottom:10px;">
        <span class="lbl">GRUPPO MUSCOLARE</span>
        <input id="cwExMus" type="text" maxlength="40" placeholder="Es. Spalle" style="margin-bottom:10px;">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
          <div><span class="lbl" style="font-size:10px;">SERIE</span><input id="cwExSets" type="number" min="1" max="10" value="${sr.sets}" style="margin:0;text-align:center;"></div>
          <div><span class="lbl" style="font-size:10px;">REPS</span><input id="cwExReps" type="text" maxlength="15" value="${sr.reps}" style="margin:0;text-align:center;"></div>
          <div><span class="lbl" style="font-size:10px;">RECUPERO (S)</span><input id="cwExRest" type="number" min="0" max="600" value="${sr.rest}" style="margin:0;text-align:center;"></div>
        </div>
        <div style="font-size:11px;color:var(--mut);margin-bottom:14px;line-height:1.5;">💡 Suggeriti per il tuo focus: ${sr.note||sr.sets+'×'+sr.reps+', recupero '+sr.rest+'s'}.</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-action" style="flex:1;padding:12px;" onclick="ST.sheetData.subSheet=null;render();">ANNULLA</button>
          <button class="btn" style="flex:1;padding:12px;background:var(--purp);color:#fff;" onclick="saveCustomExerciseToDraft()">AGGIUNGI</button>
        </div>
      </div></div>`;
    }
    // Sheet principale: editor scheda
    return`<div class="sh-ov" onclick="if(event.target===this)closeSheet()"><div class="sh"><div class="sh-h"></div>
      <div class="bebas" style="font-size:22px;margin-bottom:14px;">${d.isNew?'+ NUOVA SCHEDA':'✏️ MODIFICA SCHEDA'}</div>

      <!-- Nome scheda -->
      <span class="lbl">NOME SCHEDA</span>
      <input id="cwName" type="text" maxlength="60" value="${escapeHtml(draft.name||'')}" placeholder="Es. La mia scheda spalle" style="margin-bottom:10px;">

      <!-- Emoji -->
      <span class="lbl" style="margin-bottom:6px;">EMOJI</span>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
        ${emojis.map(e=>`<button class="btn-s" style="font-size:18px;padding:8px 12px;background:${draft.emoji===e?'rgba(167,139,250,.2)':'var(--surf)'};border:1.5px solid ${draft.emoji===e?'var(--purp)':'var(--bord)'};color:var(--text);" onclick="setCustomWorkoutEmoji('${e}')">${e}</button>`).join('')}
      </div>

      <!-- Lista esercizi attuali -->
      <span class="lbl" style="margin-bottom:6px;">ESERCIZI (${draft.exercises.length})</span>
      ${draft.exercises.length===0?`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut);background:var(--surf);border-radius:10px;margin-bottom:10px;">Nessun esercizio. Aggiungine almeno 1.</div>`:
      `<div style="margin-bottom:10px;">
        ${draft.exercises.map((e,i)=>{
          const exData=e.exId?EX[e.exId]:null;
          const name=e.isCustom?e.customName:(exData?.name||'?');
          const mus=e.isCustom?e.customMus:(exData?.mus||'');
          return `<div style="background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;margin-bottom:6px;">
            <div class="r" style="margin-bottom:8px;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:600;color:var(--text);">${escapeHtml(name)}${e.isCustom?' <span style=\"font-size:9px;color:var(--purp);background:rgba(167,139,250,.15);padding:1px 6px;border-radius:4px;font-weight:700;\">CUSTOM</span>':''}</div>
                <div style="font-size:10px;color:var(--mut);">${escapeHtml(mus)}</div>
              </div>
              <button class="btn-s" style="background:var(--red);color:#fff;font-size:11px;padding:4px 8px;" onclick="removeExerciseFromDraft(${i})">✕</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
              <div><div style="font-size:9px;color:var(--mut);letter-spacing:1px;">SERIE</div><input type="number" min="1" max="10" value="${e.sets||3}" oninput="updateExerciseInDraft(${i},'sets',this.value)" style="margin:0;padding:6px;text-align:center;font-size:13px;font-weight:700;"></div>
              <div><div style="font-size:9px;color:var(--mut);letter-spacing:1px;">REPS</div><input type="text" maxlength="15" value="${escapeHtml(e.reps||'8-12')}" oninput="updateExerciseInDraft(${i},'reps',this.value)" style="margin:0;padding:6px;text-align:center;font-size:13px;font-weight:700;"></div>
              <div><div style="font-size:9px;color:var(--mut);letter-spacing:1px;">RECUP. (S)</div><input type="number" min="0" max="600" value="${e.rest||90}" oninput="updateExerciseInDraft(${i},'rest',this.value)" style="margin:0;padding:6px;text-align:center;font-size:13px;font-weight:700;"></div>
            </div>
          </div>`;
        }).join('')}
      </div>`}

      <!-- Volume info -->
      <div style="background:rgba(167,139,250,.06);border:1.5px solid ${volCol};border-radius:10px;padding:10px 12px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:11px;color:var(--mut);">Volume totale: <strong style="color:${volCol};">${vol.totalSets} serie</strong></div>
          <div style="font-size:11px;color:var(--mut);">Min consigliato: ${minVol}</div>
        </div>
      </div>

      <!-- Aggiungi esercizio: 2 bottoni -->
      <div style="background:rgba(167,139,250,.06);border:1.5px solid var(--purp);border-radius:12px;padding:12px;margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--purp);letter-spacing:1px;margin-bottom:8px;">+ AGGIUNGI ESERCIZIO</div>
        <select id="cwExSelect" style="margin-bottom:8px;font-size:13px;padding:10px;">
          <option value="">— Scegli dalla libreria —</option>
          ${Object.keys(EX).filter(k=>!EX[k].isWarmup&&!EX[k].isCooldown&&EX[k].cat&&!['warmup','cooldown','cardio'].includes(EX[k].cat)).sort((a,b)=>EX[a].cat.localeCompare(EX[b].cat)).map(k=>`<option value="${k}">${EX[k].cat?.toUpperCase()} · ${EX[k].name}</option>`).join('')}
        </select>
        <div style="display:flex;gap:8px;">
          <button class="btn-s btn-action" style="flex:1;padding:10px;font-size:12px;" onclick="addLibraryExerciseToDraft()">+ DA LIBRERIA</button>
          <button class="btn-s" style="flex:1;background:var(--purp);color:#fff;padding:10px;font-size:12px;" onclick="openExerciseCreator()">+ CREA TUO</button>
        </div>
      </div>

      <!-- Azioni -->
      <div style="display:flex;gap:8px;">
        <button class="btn btn-action" style="flex:1;padding:12px;" onclick="closeSheet()">ANNULLA</button>
        <button class="btn" style="flex:1;padding:12px;background:var(--purp);color:#fff;" onclick="saveCustomWorkout()">SALVA</button>
      </div>
    </div></div>`;
  })():'';
  // Sheets extra (legacy rimossi: ora c'è il drawer laterale)
  const moreSheetH='';
  const shortPickH='';
  // ── NUOVA NAVIGAZIONE: Drawer laterale + topbar con titolo sezione ──
  const NAV_ITEMS=[
    {id:'home',ic:'🏠',lbl:'Home'},
    {id:'work',ic:'🏋️',lbl:'Allenamento'},
    {id:'diet',ic:'🥗',lbl:'Consigli Nutrizionali'},
    {id:'body',ic:'📊',lbl:'Analisi & Progressi'},
    {id:'measures',ic:'📐',lbl:'Misure Corporee'},
    {id:'coach',ic:'🤖',lbl:'AI Coach'},
    {id:'share',ic:'📤',lbl:'Condividi App'},
    {id:'set',ic:'⚙️',lbl:'Configurazione'},
  ];
  const curNav=NAV_ITEMS.find(n=>n.id===ST.tab)||NAV_ITEMS[0];
  const drawerH=`<div class="drawer-ov ${window.drawerOpen?'on':''}" onclick="closeDrawer()"></div>
  <aside class="drawer ${window.drawerOpen?'on':''}">
    <div class="drawer-h">
      <div class="lg">FIT<span style="color:var(--text)">TRACKER</span></div>
      <div class="sub">ADAPTIVE AI COACH</div>
    </div>
    <nav class="drawer-list">
      ${NAV_ITEMS.map(n=>`<div class="dni ${ST.tab===n.id?'on':''}" onclick="gotoTab('${n.id}')">
        <span class="dni-ic">${n.ic}</span>
        <span class="dni-lbl">${n.lbl}</span>
        <span class="dni-arr">▸</span>
      </div>`).join('')}
    </nav>
    <div class="drawer-footer">
      <div class="uname">Connesso come <strong>${AU.user||'—'}</strong></div>
      <button class="btn-s btn-action" style="width:100%;padding:10px;font-size:13px;" onclick="closeDrawer();doLogout()">🚪 Logout</button>
    </div>
  </aside>`;
  let H=drawerH+`<div class="topbar">
    <button class="hamb" onclick="toggleDrawer()" aria-label="Menu"><span class="hamb-bars"><span></span><span></span><span></span></span></button>
    <div class="tb-title"><span class="acc">${curNav.ic}</span> ${curNav.lbl.toUpperCase()}</div>
    <div style="display:flex;align-items:center;">
      <input type="date" value="${currentDateStr}" max="${getToday()}" onchange="changeCurrentDate(this.value)" style="width:auto;margin:0;padding:6px 8px;font-size:12px;border:1.5px solid ${currentDateStr!==getToday()?'var(--ora)':'var(--bord)'};border-radius:8px;color:${currentDateStr!==getToday()?'var(--ora)':'var(--text)'};background:var(--surf);font-weight:700;outline:none;cursor:pointer;">
    </div>
  </div>
  <div class="content"><div class="wrap">`;
  if(!ST.p){H+=renderSetup();H+=`</div></div>`;root.innerHTML=H+sheetH;
    // PUNTO 11: inizializza visibilità campi form registrazione
    setTimeout(()=>{if(window.toggleSessVisibility) toggleSessVisibility();},0);
    return;
  }
  if(ST.tab==='home') H+=renderHome(currentDateStr,cW,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='work') H+=renderWork(currentDateStr,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='diet') H+=renderDiet(currentDateStr,mac,an,sx,todayWoId);
  else if(ST.tab==='body') H+=renderBody(cW,mac,theme,pWeek,sx);
  else if(ST.tab==='measures') H+=renderMeasures(cW,mac,theme,pWeek,sx);
  else if(ST.tab==='coach') H+=renderCoach();
  else if(ST.tab==='share') H+=renderShare();
  else if(ST.tab==='set') H+=renderSettings(mac);
  H+=`</div></div>`;root.innerHTML=H+sheetH+moreSheetH+shortPickH+renderTour();
  if(ST.tab==='coach') setTimeout(()=>{const c=el('chatArea');if(c)c.scrollTop=c.scrollHeight;},50);
  // PUNTO 11: inizializza visibilità campi in Configurazione
  if(ST.tab==='set') setTimeout(()=>{if(window.toggleSessVisibilitySettings) toggleSessVisibilitySettings();},0);
}
// ── BOOT — Usa Firebase Auth listener ──
window.bootApp = async function() {
  try {
    window.__initAuthListener();
  } catch(e) {
    console.error("Boot Error", e);
    render();
  }
}
let _initAttempts=0;
const _startCheck=setInterval(()=>{
  _initAttempts++;
  if(window.DB && window.FBAuth){
    clearInterval(_startCheck);
    bootApp();
  } else if(_initAttempts>60){
    clearInterval(_startCheck);
    alert('Impossibile connettersi a Firebase. Ricarica la pagina.');
    renderAuth(document.getElementById('app'));
  }
},100);
</script>
</body>
</html>
