<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FitTracker PRO - Master Edition</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060606;--surf:#0f0f0f;--card:#161616;--bord:#232323;--acc:#c5f135;--ora:#ff6835;--blu:#60a5fa;--red:#ff4757;--purp:#a78bfa;--gre:#4ade80;--yel:#fbbf24;--pin:#f472b6;--text:#f0f0f0;--mut:#5a5a5a;--dim:#1e1e1e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:84px;overflow-x:hidden;}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
.wrap{padding:14px;max-width:500px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:18px;margin-bottom:11px;position:relative;overflow:hidden;}
.card-hi{border-color:var(--acc);background:linear-gradient(135deg,rgba(197,241,53,.04),transparent);}
.card-warn{border-color:var(--ora);background:rgba(255,104,53,.03);}
.card-red{border-color:var(--red);background:rgba(255,71,87,.03);}
.r{display:flex;justify-content:space-between;align-items:center;}
.rc{display:flex;align-items:center;gap:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.lbl{font-size:10px;font-weight:700;color:var(--mut);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:5px;}
.badge{position:absolute;top:0;right:0;padding:3px 12px;border-bottom-left-radius:12px;font-family:'Bebas Neue';font-size:13px;letter-spacing:1px;}
.tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.5px;}
.sep{height:1px;background:var(--bord);margin:12px 0;}
/* BUTTONS */
.btn{background:var(--acc);color:#000;border:none;padding:15px;border-radius:12px;font-weight:700;width:100%;cursor:pointer;font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;transition:.12s;display:block;touch-action:manipulation;}
.btn:active{transform:scale(.97);}
.btn-s{padding:9px 15px;font-size:14px;width:auto;border-radius:9px;border:none;cursor:pointer;font-family:'Bebas Neue';letter-spacing:1px;}
.btn-out{background:transparent;border:1.5px solid var(--bord);color:var(--mut);}
.btn-dim{background:var(--dim);color:var(--mut);border:1px solid var(--bord);}
.btn-red{background:var(--red);color:#fff;}
.btn-ora{background:var(--ora);color:#000;}
.btn-blu{background:var(--blu);color:#000;}
/* INPUTS */
input,select,textarea{width:100%;padding:13px 14px;background:var(--surf);border:1.5px solid var(--bord);color:var(--text);border-radius:10px;font-size:15px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px;-webkit-appearance:none;resize:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--acc);}
input[type=range]{-webkit-appearance:none;background:transparent;padding:0;margin:8px 0;margin-bottom:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:22px;width:22px;border-radius:50%;background:var(--purp);cursor:pointer;margin-top:-7px;box-shadow:0 0 8px rgba(167,139,250,.5);}
input[type=range]::-webkit-slider-runnable-track{width:100%;height:8px;cursor:pointer;background:var(--bg);border-radius:4px;border:1px solid var(--bord);}
::placeholder{color:var(--mut);}
select option{background:var(--card);}
/* NAV */
.tnav{position:fixed;top:0;left:0;width:100%;background:rgba(6,6,6,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--bord);display:flex;justify-content:space-around;z-index:1000;padding:0 2px;}
.ni{padding:12px 0 10px;color:var(--mut);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border-bottom:3px solid transparent;width:16.6%;text-align:center;transition:.18s;}
.ni.on{color:var(--text);border-bottom-color:var(--acc);}
.ni .ic{font-size:17px;line-height:1;}
.content{padding-top:72px;}
/* BARS */
.bw{background:var(--dim);border-radius:99px;overflow:hidden;}
.bf{border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1);}
/* WORKOUT OVERLAY */
.wo{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:2000;overflow-y:auto;display:flex;flex-direction:column;}
.wo-head{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--bord);padding:14px 18px;z-index:10;display:flex;justify-content:space-between;align-items:center;}
/* SHEET */
.sh-ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:3000;display:flex;align-items:flex-end;justify-content:center;}
.sh{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:82vh;overflow-y:auto;padding:20px 16px 40px;}
.sh-h{width:36px;height:4px;background:var(--bord);border-radius:2px;margin:0 auto 16px;}
/* CHAT */
.bbl{max-width:82%;padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.55;margin-bottom:8px;}
.bbl-u{background:var(--acc);color:#000;border-bottom-right-radius:4px;align-self:flex-end;}
.bbl-ai{background:var(--surf);border:1px solid var(--bord);border-bottom-left-radius:4px;align-self:flex-start;}
/* AUTH */
.auth-w{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% -10%,rgba(197,241,53,.08),transparent 60%);}
.atab{flex:1;padding:12px;background:none;border:none;color:var(--mut);font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;}
.atab.on{color:var(--acc);border-bottom-color:var(--acc);}
/* SEX PICKER */
.sx-btn{flex:1;padding:16px 8px;border-radius:12px;border:1.5px solid var(--bord);background:var(--surf);color:var(--mut);cursor:pointer;text-align:center;transition:.15s;font-family:'DM Sans',sans-serif;}
.sx-btn.on{border-color:var(--acc);background:rgba(197,241,53,.08);color:var(--text);}
/* INTOLERANCE CHIPS */
.intol-chip{padding:8px 14px;border-radius:10px;border:1.5px solid var(--bord);background:var(--surf);color:var(--mut);cursor:pointer;font-size:12px;font-weight:600;transition:.15s;}
.intol-chip.on{border-color:var(--red);background:rgba(255,71,87,.1);color:var(--red);}
/* MISC */
.step-n{width:24px;height:24px;border-radius:50%;background:var(--acc);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.cue-box{background:rgba(197,241,53,.07);border-left:3px solid var(--acc);padding:9px 12px;border-radius:0 8px 8px 0;font-size:13px;color:var(--text);line-height:1.5;margin-bottom:5px;}
.err-box{background:rgba(255,71,87,.1);border:1px solid var(--red);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--red);margin-bottom:12px;}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:var(--bord);}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* DATA PICKER NATIVO FIX */
input[type="date"]::-webkit-date-and-time-value { text-align: left; }
input[type="date"]::-webkit-datetime-edit { display: block; padding: 0; }
</style>

  import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  // LE TUE CHIAVI FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyD7M6tX2diy6R-AuOPpG-VZQFO_MzPVSuQ",

  };

  let firestore;
  try {
    const app = initializeApp(firebaseConfig);
    firestore = getFirestore(app);
    console.log("🚀 Firebase Inizializzato");
  } catch (e) {
    console.error("Errore inizializzazione Firebase:", e);
  }

  window.DB = {
    async g(k) {
      if(!firestore) return null;
      try {
        const docRef = doc(firestore, "fittracker_data", k);
        const docSnap = await getDoc(docRef);
        return docSnap.exists() ? docSnap.data().value : null;
      } catch (e) { console.error("Errore lettura DB:", e); return null; }
    },
    async s(k, v) {
      if(!firestore) return;
      try {
        const docRef = doc(firestore, "fittracker_data", k);
        await setDoc(docRef, { value: v });
      } catch (e) { console.error("Errore salvataggio DB:", e); }
    },
    async d(k) {
      if(!firestore) return;
      try {
        const docRef = doc(firestore, "fittracker_data", k);
        await deleteDoc(docRef);
      } catch (e) { console.error("Errore cancellazione DB:", e); }
    }
  };

  window.SS = {
    get: () => localStorage.getItem('ft_session'),
    set: (u) => localStorage.setItem('ft_session', u),
    clr: () => localStorage.removeItem('ft_session')
  };
</script>

function buildWeeklyPlan(sessions,goal,sex){
  if(sessions===0) return Array(7).fill('steps');
  if(sessions===1) return ['D','rest','rest','rest','rest','rest','free'];
  if(sessions===2) return ['A','rest','rest','C','rest','rest','free'];
  if(sessions===3){
    if(sex==='f') return ['A','rest','B','rest','C','rest','free'];
    return ['A','rest','B','rest','C','rest','free'];
  }
  if(sessions===4) return ['A','rest','B','C','rest','A','free'];
  if(sessions===5) return ['A','B','rest','C','A','B','free'];
  if(sessions>=6) return ['A','B','C','A','B','C','free'];
  return ['A','rest','B','rest','C','rest','free'];
}

function calcBMR(w,h,age,sex){
  if(sex==='m') return Math.round(10*w+6.25*h-5*age+5);
  return Math.round(10*w+6.25*h-5*age-161);
}
function actMultiplier(sessions){
  if(sessions===0) return 1.2;
  if(sessions<=2) return 1.375;
  if(sessions<=4) return 1.55;
  return 1.725;
}
function calcMacros(w,h,age,sex,goal,sessions,analysis){
  const bmr=calcBMR(w,h||170,age||25,sex||'m');
  const tdee=Math.round(bmr*actMultiplier(sessions));
  let kcal=goal.t==='cut'?(tdee-500):(tdee+300);
  kcal+=analysis?.calAdj||0;
  if(goal.t==='cut'&&kcal<w*22) kcal=w*22;
  kcal=Math.round(kcal);
  const protMult=sex==='f'?1.8:2.2;
  const prot=Math.round(w*protMult);
  const fat=Math.round(w*(sex==='f'?1.0:0.8));
  const carb=Math.max(50,Math.round((kcal-(prot*4)-(fat*9))/4));
  const effCardio=Math.max(0,Math.min(5,(goal.cardioLevel||1)+(analysis?.cardioAdj||0)));
  return{kcal,prot,fat,carb,bmr,tdee,cardioLevel:effCardio};
}

function analyze(history,goal){
  if(!history||history.length<4) return{status:'new',msg:'Inserisci almeno 4 pesate per attivare l\'AI adattiva.',col:'var(--mut)',calAdj:0,cardioAdj:0,alert:null};
  const recent=history.slice(-14);
  const fw=recent[0].w,lw=recent[recent.length-1].w,days=Math.max(1,recent.length);
  const wRate=goal.t==='cut'?((fw-lw)/days*7):((lw-fw)/days*7);
  const tRate=goal.t==='cut'?0.6:0.3;
  const ratio=wRate/tRate;
  const currW=history[history.length-1].w;
  const rem=Math.abs(currW-goal.g);
  const wkNeed=rem/Math.max(0.05,wRate);
  const proj=new Date();proj.setDate(proj.getDate()+wkNeed*7);
  let status,msg,col,calAdj=0,cardioAdj=0,alert=null;
  if(goal.t==='cut'){
    if(ratio<0.1){status='stalled';msg='🚨 STALLO METABOLICO. Peso bloccato. Ho ridotto le calorie e aumentato il cardio.';col='var(--red)';calAdj=-250;cardioAdj=2;alert='stalled';}
    else if(ratio<0.5){status='slow';msg='⚠️ Progresso lento. Riduco le calorie e aggiungo cardio per accelerare.';col='var(--ora)';calAdj=-150;cardioAdj=1;alert='slow';}
    else if(ratio<0.8){status='good';msg='✅ Progresso nella norma. Il piano sta funzionando.';col='var(--acc)';}
    else if(ratio<=1.3){status='perfect';msg='🎯 Ritmo ottimale! Sei perfettamente in linea con l\'obiettivo.';col='var(--acc)';}
    else if(ratio<=1.8){status='fast';msg='⚡ Vai veloce! Ho aumentato leggermente le calorie per proteggere la massa muscolare.';col='var(--yel)';calAdj=150;cardioAdj=-1;alert='fast';}
    else{status='tfast';msg='🛑 Troppo veloce — rischio perdita muscolare. Calorie aumentate, cardio ridotto.';col='var(--red)';calAdj=250;cardioAdj=-2;alert='tfast';}
  }else{
    if(ratio<0.3){status='slow';msg='⚠️ Massa troppo lenta. Ho aumentato le calorie.';col='var(--ora)';calAdj=200;cardioAdj=-1;}
    else if(ratio<=1.3){status='good';msg='✅ Buona progressione muscolare.';col='var(--acc)';}
    else{status='fast';msg='🍃 Crescita rapida. Aggiungo cardio per contenere il grasso.';col='var(--yel)';cardioAdj=1;calAdj=-100;}
  }
  return{status,msg,col,calAdj,cardioAdj,wRate:wRate.toFixed(2),tRate,ratio:ratio.toFixed(2),proj,wkNeed:wkNeed.toFixed(1),alert};
}

function getSetsReps(type,goal,pw){
  const cyc=Math.floor((pw-1)/4),wic=(pw-1)%4,isD=wic===3;
  if(goal==='cut'){
    if(isD) return{sets:2,reps:'12-15',rest:60,note:'⟳ Deload'};
    if(type==='compound') return{sets:3+Math.min(cyc,1),reps:cyc>=2?'8-10':'10-12',rest:cyc>=2?90:75};
    if(type==='isometric') return{sets:3,reps:'30-45s',rest:45};
    return{sets:3,reps:cyc>=1?'12-15':'15-20',rest:50};
  }else{
    if(isD) return{sets:3,reps:'8-10',rest:90,note:'⟳ Deload'};
    if(type==='compound') return{sets:4+Math.min(cyc,1),reps:cyc>=2?'4-6':cyc>=1?'6-8':'8-10',rest:cyc>=2?180:cyc>=1?150:120};
    if(type==='isometric') return{sets:3,reps:'30-45s',rest:45};
    return{sets:3,reps:cyc>=1?'8-10':'10-12',rest:90};
  }
}

function buildWorkout(woId,goal,pw,exPrefs,sex,analysis){

    const sr=getSetsReps(ex.t,goal.t,pw);

    exercises.push({...EX['cd_hiit'],id:'cd_hiit',slot:'bonus',cat:'cardio',sets:1,reps:'15 min HIIT',rest:0,isBonus:true});
  }
  return{...sch,exercises};
}

function getSuggest(exId,wHist){
  const entries=Object.keys(wHist||{}).sort().reverse().slice(0,6).map(d=>wHist[d]).filter(s=>s&&s[exId]);
  if(!entries.length) return{kg:null,hint:'Calibra nella prima serie'};
  const last=entries[0][exId];
  if(entries.length>=3&&entries.slice(0,3).every(e=>e[exId]?.ok)&&last.kg>0)
    return{kg:+(last.kg*1.05).toFixed(1),hint:`🔼 Tenta ${+(last.kg*1.05).toFixed(1)} kg (+5%)`};
  return last.kg>0?{kg:last.kg,hint:`Ultima volta: ${last.kg} kg`}:{kg:null,hint:'Calibra il peso'};
}

function pw(start){if(!start) return 1; return Math.max(1,Math.ceil((new Date()-new Date(start))/864e5/7));}
function streak(log){
  if(!log?.length) return 0;
  const days=[...new Set(log.map(w=>w.d))].sort().reverse();
  let s=0,p=null;
  for(const d of days){if(!p){p=d;s=1;continue;}const df=(new Date(p)-new Date(d))/864e5;if(df<=3){s++;p=d;}else break;}
  return s;
}

function initProgram(){
  const w=parseFloat(vv('iW')),g=parseFloat(vv('gW')),t=vv('iT'),dur=parseInt(vv('iDur')),tRaw=vv('iDate'),loc=vv('iLoc');
  const sess=parseInt(vv('iSess'))||3,cl=parseInt(vv('iCardio'))||1;
  const intol=[...document.querySelectorAll('.intol-chip.on')].map(c=>c.dataset.id);
  if(!w||!g||!tRaw) return alert('Compila tutti i campi!');
  if(sess===0&&t==='bulk') return alert('⚠️ Con 0 sessioni di allenamento non è possibile fare una fase di massa muscolare.');
  if(sess===1&&t==='bulk') return alert('⚠️ Per una fase di massa efficace serve un minimo di 2 sessioni a settimana.');
  let tDate=new Date(tRaw);
  const minWk=t==='cut'?Math.abs(w-g)/0.8:Math.abs(w-g)/0.3;
  if((tDate-new Date())/(7*864e5)<minWk){tDate=new Date(new Date().getTime()+minWk*7*864e5);alert('La data era troppo vicina. L\'AI ha impostato la data minima sicura per la tua salute muscolare.');}
  ST.p={s:w,g:g,t,dur,targetD:tDate.toISOString().split('T')[0],sessions:sess,cardioLevel:cl,intol,loc};
  ST.programStart=currentDateStr||getToday();
  if(!ST.h.length) ST.h=[{d:currentDateStr,w:w}];
  save();
}

function updateProgram(){
  const g=parseFloat(vv('eG')),t=vv('eT'),dur=parseInt(vv('eDur')),tRaw=vv('eDate'),sess=parseInt(vv('eSess'))||3,cl=parseInt(vv('eCardio'))||1,loc=vv('eLoc');
  const intol=[...document.querySelectorAll('.intol-chip2.on')].map(c=>c.dataset.id);
  if(!g||!tRaw) return alert('Compila i campi!');
  if(sess===0&&t==='bulk') return alert('⚠️ Con 0 sessioni la massa non è possibile. Scegli almeno 2 sessioni.');
  if(sess===1&&t==='bulk') return alert('⚠️ Con 1 sola sessione la massa è inefficace. Scegli almeno 2 sessioni o passa alla Definizione.');
  let tDate=new Date(tRaw);
  const currW=ST.h[ST.h.length-1].w;
  const minWk=t==='cut'?Math.abs(currW-g)/0.8:Math.abs(currW-g)/0.3;
  if((tDate-new Date())/(7*864e5)<minWk){tDate=new Date(new Date().getTime()+minWk*7*864e5);alert('Data corretta dall\'AI.');}
  ST.p.g=g;ST.p.t=t;ST.p.dur=dur;ST.p.targetD=tDate.toISOString().split('T')[0];ST.p.sessions=sess;ST.p.cardioLevel=cl;ST.p.intol=intol;ST.p.loc=loc;
  save();alert('Programma aggiornato!');
}

function svg(data,key,col,H,goal){
  if(data.length<2) return`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut)">Aggiungi almeno 2 dati</div>`;
  const W=320,pl=28,pr=10,pt=8,pb=18;
  const vals=data.map(d=>d[key]||d.v||0);const allV=goal?[...vals,goal]:vals;
  const mn=Math.min(...allV)*.97,mx=Math.max(...allV)*1.03;
  const xs=i=>pl+(i/(data.length-1))*(W-pl-pr);
  const ys=v=>H-pb-((v-mn)/(mx-mn))*(H-pt-pb);
  const line=data.map((d,i)=>`${i===0?'M':'L'}${xs(i).toFixed(1)},${ys(d[key]||d.v||0).toFixed(1)}`).join(' ');
  const n=data.length-1;
  return`<svg width="100%" height="${H+4}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">
    ${goal?`<line x1="${pl}" y1="${ys(goal)}" x2="${W-pr}" y2="${ys(goal)}" stroke="${col}" stroke-width="1" stroke-dasharray="5 4" opacity=".45"/>
    <text x="${W-pr}" y="${ys(goal)-4}" fill="${col}" font-size="9" text-anchor="end" opacity=".7">obiettivo</text>`:''}
    <path d="${line} L${xs(n)},${H-pb} L${xs(0)},${H-pb}Z" fill="${col}" opacity=".07"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((d,i)=>`<circle cx="${xs(i)}" cy="${ys(d[key]||d.v||0)}" r="3.5" fill="var(--card)" stroke="${col}" stroke-width="2.5"/>`).join('')}
    <text x="${pl-4}" y="${ys(mn)+4}" fill="var(--mut)" font-size="9" text-anchor="end">${mn.toFixed(0)}</text>
    <text x="${pl-4}" y="${ys(mx)+4}" fill="var(--mut)" font-size="9" text-anchor="end">${mx.toFixed(0)}</text>
  </svg>`;
}

  if(ST.tab==='home') H+=renderHome(currentDateStr,cW,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='work') H+=renderWork(currentDateStr,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='diet') H+=renderDiet(currentDateStr,mac,an,sx);
  else if(ST.tab==='body') H+=renderBody(cW,mac,theme,pWeek,sx);
  else if(ST.tab==='coach') H+=renderCoach();
  else if(ST.tab==='set') H+=renderSettings(mac);

  H+=`</div></div>`;root.innerHTML=H+sheetH;
  if(ST.tab==='coach') setTimeout(()=>{const c=el('chatArea');if(c)c.scrollTop=c.scrollHeight;},50);
}

          isSkipped?`<span style="color:var(--red);font-size:12px;padding:6px 11px;border:1px solid var(--red);border-radius:8px;font-weight:700;">❌ SALTATO</span>` :

          <button class="btn-s" style="background:var(--surf);color:var(--mut);border:1px solid var(--bord);font-family:'Bebas Neue';font-size:12px;padding:6px 10px;" onclick="skipMeal('${m.id}')">⏭️ SALTA</button>
          <button class="btn-s" style="background:var(--surf);color:var(--acc);border:1px solid var(--acc);font-family:'Bebas Neue';font-size:13px;" onclick="logMeal('${m.id}',${m.pct},${mac.kcal},${mac.prot},${mac.carb},${mac.fat})">FATTO ✓</button>
        </div>`}
      </div>
      ${m.opts.length>1?`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;">
        ${m.opts.map((o,i)=>`<button onclick="pickMealOpt('${m.id}',${i})" style="flex:0 0 auto;padding:6px 12px;border-radius:8px;border:1.5px solid ${selIdx===i?'var(--acc)':'var(--bord)'};background:${selIdx===i?'rgba(197,241,53,.1)':'var(--surf)'};color:${selIdx===i?'var(--acc)':'var(--mut)'};font-size:12px;font-weight:600;cursor:pointer;">${o.lbl}</button>`).join('')}
      </div>`:''}
      <div>${opt.items.map(item=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bord);"><div style="width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:7px;"></div><div style="font-size:13px;line-height:1.4;">${item}</div></div>`).join('')}</div>
    </div>`;
  }).join('')}`;
}

  const wLogF=ST.wLog.filter(w=>!w.isRest);
  const lost=(ST.h[0]?.w||cW)-cW;
  return`
  <div class="bebas" style="font-size:26px;margin-bottom:14px;">BODY ANALYTICS</div>
  <div class="g2" style="margin-bottom:10px;">
    ${[['KG PERSI',`${lost>=0?'-':'+'}${Math.abs(lost).toFixed(1)}kg`,'var(--acc)'],['MANCANTI',Math.abs(ST.p.g-cW).toFixed(1)+' kg','var(--ora)']].map(([l,v,c])=>`<div class="card" style="text-align:center;padding:14px;border-top:3px solid ${c};"><div class="bebas" style="font-size:28px;color:${c};line-height:1;">${v}</div><div style="font-size:9px;color:var(--mut);letter-spacing:1.5px;margin-top:2px;">${l}</div></div>`).join('')}

  <div class="card"><span class="lbl">ANDAMENTO PESO</span>${svg(wArr,'w',theme,110,ST.p.g)}</div>

  <div class="card">
    <div class="r" style="margin-bottom:14px;"><div><div class="bebas" style="font-size:18px;">📐 MISURE CORPOREE</div><div style="font-size:11px;color:var(--mut);">in cm (Registrate per il ${new Date(currentDateStr).toLocaleDateString('it-IT')})</div></div><button class="btn-s btn-blu" onclick="saveMeasures()">SALVA</button></div>
    <div class="g2">
      ${[['waist','Vita (ombelico)'],['chest','Torace'],['hips','Fianchi'],['arm','Braccio'],['thigh','Coscia']].map(([f,l])=>`<div><span class="lbl">${l}</span><input type="number" id="m_${f}" placeholder="cm" value="${ST.measures[currentDateStr]?.[f]||''}" style="margin:0;padding:10px;font-size:14px;"></div>`).join('')}
    </div>
  </div>
  
  <div class="card"><span class="lbl">DIARIO DEGLI ALLENAMENTI</span>
    ${ST.wLog.length===0?`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut)">Nessun allenamento ancora</div>`:''}
    ${ST.wLog.slice().reverse().slice(0,8).map(w=>`<div style="padding:10px 0;border-bottom:1px solid var(--bord);" class="r"><div class="rc"><div style="width:32px;height:32px;border-radius:8px;background:${w.isRest?'var(--surf)':'rgba(197,241,53,.1)'};border:1px solid ${w.isRest?'var(--bord)':'var(--acc)'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${w.isRest?'var(--mut)':'var(--acc)'};">${w.isRest?'Z':'✓'}</div><div><div style="font-size:13px;font-weight:600;">${w.t}</div><div style="font-size:10px;color:var(--mut);">${new Date(w.d).toLocaleDateString('it-IT')}</div></div></div>${!w.isRest?`<div style="font-size:13px;"><strong style="color:var(--acc);">${w.vol}</strong><span style="color:var(--mut);"> kg</span></div>`:''}</div>`).join('')}
  </div>`;
}

window.main = async function() {
  const saved = window.SS.get();
  if(saved){
    AU.user = saved;
    const data = await window.DB.g('ft_u_'+saved);
    if(data) Object.assign(ST, {...defST(), ...data});
    const reg = (await window.DB.g('ft_reg')) || [];
    AU.profile = reg.find(u => u.un === saved) || {sx:'m', ht:170, ag:25};
  }
  render();
};

let initAttempts = 0;
const startApp = setInterval(() => {
  if (window.DB) {
    clearInterval(startApp);
    window.main();
  } else if(initAttempts > 50) { 
    clearInterval(startApp);
    alert("Impossibile connettersi al database. Controlla la tua connessione e ricarica la pagina.");
  }
  initAttempts++;
}, 100);

</script>
