window.startSet=function(){
  ST.woPhase='active';ST.setElapsed=0;clearInterval(ST.setTmrId);
  ST.setTmrId=setInterval(()=>{
    ST.setElapsed++;const e=el('setTmrUI');
    if(e){const m=Math.floor(ST.setElapsed/60).toString().padStart(2,'0');const s=(ST.setElapsed%60).toString().padStart(2,'0');e.textContent=`${m}:${s}`;}
  },1000);render();
}
window.completeSet=function(){
  clearInterval(ST.setTmrId);
  const wo=getWo();const ex=wo.exercises[ST.step];
  // Per riscaldamento e stretching: nessun peso, salta il conteggio volume
  const isSpecial=ex.isWarmup||ex.isCooldown||ex.isBonus;
  if(!isSpecial){
    // PUNTO 7: leggi il valore corretto in base al tipo di esercizio
    const unit = getExerciseUnit(ex);
    const inputEl = el('wkW');
    let value = parseFloat(inputEl?.value || 0);
    // Se l'esercizio è a tempo e l'utente non ha inserito nulla, usa il timer della serie
    if (unit === 'sec' && (!value || value <= 0) && ST.setElapsed > 0) {
      value = ST.setElapsed;
    }
    if(!ST.wHistory[currentDateStr]) ST.wHistory[currentDateStr]={};
    // PUNTO 5+8: salvo struttura completa (val + unit) per memoria precisa
    ST.wHistory[currentDateStr][ex.id] = {
      kg: unit === 'kg' && value > 0 ? value : null,
      sec: unit === 'sec' && value > 0 ? value : null,
      reps: unit === 'reps' && value > 0 ? value : null,
      unit: unit,
      ok: true
    };
    if (unit === 'kg' && value > 0) ST.currVol += Math.round(value * parseMeanReps(ex.reps));
  }
  ST.currentSet++;
  const totalSets=parseInt(ex.sets)||1;
  if(ST.currentSet>=totalSets){
    ST.woPhase='exercise_done';
    BeepPlayer.beep(880, 0.25, 'sine', 0.4); // beep esercizio completato
    render();
  }
  else{
    ST.woPhase='rest';ST.tmr=ex.rest||60;render();
    ST.tmrId=setInterval(()=>{
      ST.tmr--;const e=el('tmrUI');if(e)e.textContent=ST.tmr;
      // PUNTO 4: tick negli ultimi 3 secondi
      if (ST.tmr === 3 || ST.tmr === 2 || ST.tmr === 1) BeepPlayer.tick();
      if(ST.tmr<=0){
        clearInterval(ST.tmrId);
        BeepPlayer.endOfRest();  // PUNTO 4: beep "fine pausa"
        ST.woPhase='ready';
        // PUNTO 3: se autostart attivo, parte automaticamente la serie successiva
        if (ST.p?.autostartSeries) {
          render();
          // Mini-delay per dare percezione del beep prima di partire
          setTimeout(() => { if (ST.aWo && ST.woPhase === 'ready') startSet(); }, 800);
        } else {
          render();
        }
      }
    },1000);
  }
}

    weekNumber:pwk(ST.programStart),
    targetKcal:mac.kcal,targetProt:mac.prot,

    workoutsCompleted14d:wLogF.filter(w=>w.d>=last14[0]?.d).length,
    workoutsTarget14d:(ST.p.sessions!=null?ST.p.sessions:3)*2,

window.svg=function(data,key,col,H,goal){
  if(data.length<2) return`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut)">Aggiungi almeno 2 dati per il grafico</div>`;
  const W=320,pl=28,pr=10,pt=8,pb=18;
  const vals=data.map(d=>d[key]||d.v||0);const allV=goal?[...vals,goal]:vals;
  const mn=Math.min(...allV)*.97,mx=Math.max(...allV)*1.03;
  const xs=i=>pl+(i/(data.length-1))*(W-pl-pr);
  const ys=v=>H-pb-((v-mn)/(mx-mn))*(H-pt-pb);
  const line=data.map((d,i)=>`${i===0?'M':'L'}${xs(i).toFixed(1)},${ys(d[key]||d.v||0).toFixed(1)}`).join(' ');
  const n=data.length-1;
  return`<svg width="100%" height="${H+4}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible"> ${goal?`<line x1="${pl}" y1="${ys(goal)}" x2="${W-pr}" y2="${ys(goal)}" stroke="${col}" stroke-width="1" stroke-dasharray="5 4" opacity=".45"/> <text x="${W-pr}" y="${ys(goal)-4}" fill="${col}" font-size="9" text-anchor="end" opacity=".7">obiettivo</text>`:''} <path d="${line} L${xs(n)},${H-pb} L${xs(0)},${H-pb}Z" fill="${col}" opacity=".07"/> <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/> ${data.map((d,i)=>`<circle cx="${xs(i)}" cy="${ys(d[key]||d.v||0)}" r="3.5" fill="var(--card)" stroke="${col}" stroke-width="2.5"/>`).join('')} <text x="${pl-4}" y="${ys(mn)+4}" fill="var(--mut)" font-size="9" text-anchor="end">${mn.toFixed(0)}</text> <text x="${pl-4}" y="${ys(mx)+4}" fill="var(--mut)" font-size="9" text-anchor="end">${mx.toFixed(0)}</text> </svg>`;
}

window.renderHome = function(t2,cW,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog){
  const stk=streak(ST.wLog);
  const kgLeft=Math.max(0,ST.p.t==='cut'?cW-ST.p.g:ST.p.g-cW).toFixed(1);
  const span=Math.abs(ST.p.s-ST.p.g)||1;
  const progress=Math.min(100,Math.max(0,Math.abs(ST.p.s-cW)/span*100));
  const isD=(pWeek-1)%4===3;
  const todayWater=ST.water[t2]||0;
  const waterGoal=sx==='f'?10:12;
  const dLog=ST.nutri[t2]||{k:0,logged:[],skipped:[]};
  const remK=Math.max(0,mac.kcal-(dLog.k||0));
  const excessK=Math.max(0,(dLog.k||0)-mac.kcal);
  const calPct=Math.min(100,((dLog.k||0)/mac.kcal)*100);
  const wEntry=ST.h.find(x=>x.d===t2);
  const weightSaved=!!wEntry;
  const stepsSaved=ST.life[t2]&&ST.life[t2].steps>0;
  const stepsValue=ST.life[t2]?.steps||0;
  const stepsGoal=sx==='f'?10000:12000;
  const noTraining=(ST.p.sessions||0)===0;
  const todayActs=(ST.activities&&ST.activities[t2])||[];
  const actsKcal=todayActs.reduce((s,a)=>s+(a.kcal||0),0);
  const actsMin=todayActs.reduce((s,a)=>s+(a.minutes||0),0);

  // ═══════════════════════════════════════════════════════════
  // PILASTRO 1 — PASTO (corrente o prossimo)
  // ═══════════════════════════════════════════════════════════
  const now=new Date();
  const curHM=now.getHours()*60+now.getMinutes();
  const T=Object.assign({col:'07:00',sp1:'10:30',pra:'13:00',sp2:'16:00',cen:'19:30'},ST.p.times||{});
  const toMin=s=>{const [h,m]=s.split(':').map(Number);return h*60+m;};
  const PCT_H={col:0.22,sp1:0.10,pra:0.32,sp2:0.08,cen:0.28};
  const mealWindows=[
    {id:'col',t:T.col,win:90,icon:'🌅',name:'COLAZIONE'},
    {id:'sp1',t:T.sp1,win:60,icon:'🍎',name:'SPUNTINO MATTINA'},
    {id:'pra',t:T.pra,win:120,icon:'🍽️',name:'PRANZO'},
    {id:'sp2',t:T.sp2,win:60,icon:'🍎',name:'SPUNTINO POMERIGGIO'},
    {id:'cen',t:T.cen,win:120,icon:'🌙',name:'CENA'},
  ];
  // Trovo il pasto attuale (finestra) e il prossimo
  let activeMeal=null, nextMeal=null;
  for(const m of mealWindows){
    const mm=toMin(m.t);
    const diff=curHM-mm; // >0 = siamo in ritardo, <0 = ancora da arrivare
    if(Math.abs(diff)<=m.win && !activeMeal) activeMeal=m;
    if(mm>curHM && !nextMeal) nextMeal=m;
  }
  // Fallback: se siamo prima di colazione → next è colazione; se dopo cena → nulla di "attivo"
  if(!activeMeal && !nextMeal) nextMeal=mealWindows[0];
  const mealToShow = activeMeal || nextMeal;
  const isActiveMeal = !!activeMeal;
  const mealLogged = mealToShow && dLog.logged?.includes(mealToShow.id);
  const mealSkipped = mealToShow && dLog.skipped?.includes(mealToShow.id);
  const mealCompleted = mealLogged || mealSkipped;
  // Calcolo kcal del pasto (custom o target %)
  let mealKcal=0, mealCustom=false;
  if(mealToShow){
    const cm=ST.p?.customMeals?.[mealToShow.id];
    if(cm && cm.length>0){
      mealKcal=cm.reduce((s,i)=>s+(i.kcal||0),0);
      mealCustom=true;
    } else {
      mealKcal=Math.round(mac.kcal*PCT_H[mealToShow.id]);
    }
  }
  // Riepilogo giornaliero pasti (per stato "tutti fatti")
  const mealsDoneToday=(dLog.logged?.length||0)+(dLog.skipped?.length||0);
  const mealsTotalToday=5;
  const allMealsHandled=mealsDoneToday>=mealsTotalToday;

  // ═══════════════════════════════════════════════════════════
  // PILASTRO 2 — ALLENAMENTO
  // ═══════════════════════════════════════════════════════════
  let woInfo=null;
  const woAlreadyDone = todayLog && !todayLog.isRest;
  const restAlreadyLogged = todayLog && todayLog.isRest;
  if(todayWoId && todayWoId!=='REST' && !noTraining){
    const cw=(ST.p.customWorkouts||[]).find(w=>w.id===todayWoId);
    if(cw){
      woInfo={name:cw.name,emoji:cw.emoji||'🛠️',col:cw.color||'#a78bfa',exCount:cw.exercises.length,isCustom:true,id:cw.id};
    } else if(typeof WO_SCH!=='undefined' && WO_SCH[todayWoId]){
      const wo=WO_SCH[todayWoId];
      woInfo={name:wo.name,emoji:wo.emoji,col:wo.col,exCount:wo.slots.length,isCustom:false,id:todayWoId};
    }
  }
  const isRestDayPlanned = todayWoId==='REST' || noTraining;

  // ═══════════════════════════════════════════════════════════
  // PRIORITÀ VISIVA: quale card è "attiva" (accento vivo)?
  // Logic: se è ora di un pasto non fatto → pasto primario.
  //        altrimenti se allenamento da fare → allenamento primario.
  //        altrimenti il primo non completato tra i due.
  // ═══════════════════════════════════════════════════════════
  let mealIsPrimary = false;
  if(isActiveMeal && !mealCompleted){
    mealIsPrimary = true;
  } else if(woInfo && !woAlreadyDone && !restAlreadyLogged){
    mealIsPrimary = false;
  } else if(!mealCompleted && isActiveMeal){
    mealIsPrimary = true;
  } else {
    // Entrambi completati → il pasto principale del momento ha priorità
    mealIsPrimary = isActiveMeal;
  }

  // Helper per colori card: attiva = bordo vivo, sfondo tinta, glow; fatta = verde sobrio; inattiva = grigio soft

    if(isRestDayPlanned && !restAlreadyLogged && !mealIsPrimary) return {border:'var(--blu)', bg:'linear-gradient(145deg,rgba(96,165,250,.06),rgba(96,165,250,.02))', glow:''};
    return {border:'var(--bord)', bg:'var(--card)', glow:''};
  })();

  // ─── Costruisco HTML pasto ─────────────────────────────────
  let mealCardHtml='';
  if(mealCompleted){

  } else if(activeMeal){

  } else if(nextMeal){

// ── renderWork: FIX 1 (riposo=niente schede), FIX 2 (sequenza A→B→C), FIX 3 (calendario reale) ──
window.buildLegendGrid=function(weekStatus,DAY_NAMES,dOfW){
  return weekStatus.map(function(ws,i){
    var isT=i===dOfW;
    var planned=ws.planned||'rest';
    var actual=ws.actual;
    var planCol=planned&&WO_SCH[planned]?WO_SCH[planned].col:planned==='cardio'?'var(--blu)':planned==='steps'?'var(--gre)':planned==='free'?'var(--ora)':'var(--dim)';
    var displayId=actual||planned;
    var displayCol=actual&&WO_SCH[actual]?WO_SCH[actual].col:actual==='rest'?'var(--purp)':planCol;
    var label=displayId==='free'?'🎉':displayId==='steps'?'🚶':displayId==='cardio'?'🏃':displayId==='rest'?'-':displayId||'-';
    var dot='';
    if(ws.completed) dot='<div style="width:6px;height:6px;border-radius:50%;background:var(--acc);margin:2px auto 0;"></div>';
    else if(ws.isRest) dot='<div style="width:6px;height:6px;border-radius:50%;background:var(--purp);margin:2px auto 0;"></div>';
    else if(ws.d<getToday()&&planned!=='free'&&planned!=='rest') dot='<div style="width:6px;height:6px;border-radius:50%;background:var(--red);margin:2px auto 0;opacity:.5;"></div>';
    return '<div style="text-align:center;padding:8px 2px;border-radius:9px;background:'+(isT?displayCol+'15':'var(--surf)')+';border:1px solid '+(isT?displayCol:'var(--bord)')+';">'
      +'<div style="font-size:8px;font-weight:700;color:'+(isT?'var(--text)':'var(--mut)')+';margin-bottom:2px;">'+DAY_NAMES[i]+'</div>'
      +'<div style="font-family:Bebas Neue;font-size:'+(displayId&&WO_SCH[displayId]?'15px':'12px')+';color:'+displayCol+';">'+label+'</div>'
      +dot+'</div>';
  }).join('');
}

    // Totale passi settimana corrente
    const today=new Date(t2+'T12:00:00');
    const dow=(today.getDay()+6)%7;
    const monday=new Date(today);monday.setDate(today.getDate()-dow);

    for(let i=0;i<7;i++){
      const d=new Date(monday);d.setDate(monday.getDate()+i);
      const dStr=d.toISOString().split('T')[0];
      const s=ST.life[dStr]?.steps||0;
      weekSteps+=s;
      if(s>0) daysWithSteps++;
    }
    const weekGoal=stepsGoal*7;
    const weekPct=Math.min(100,Math.round(weekSteps/weekGoal*100));

    else if(stepsPct>=75){ motivMsg=`Quasi fatto! Mancano ${(stepsGoal-stepsToday).toLocaleString('it-IT')} passi.`; motivCol='var(--acc)'; }
    else if(stepsPct>=50){ motivMsg=`A metà strada. Fai ancora una bella camminata di ${Math.round((stepsGoal-stepsToday)/100)*100} passi.`; motivCol='var(--gre)'; }

      +(hint?'<div style="font-size:10px;color:var(--mut);margin-bottom:6px;">'+hint+'</div>':'')
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
      +'<div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:4px;"><span>DESTRA</span>'
      +(dR!==null?'<span style="color:'+colDiff(dR)+';font-weight:700;">'+(dR>0?'+':'')+dR.toFixed(1)+'cm</span>':(lR>0?'<span>prec. '+lR+'cm</span>':''))
      +'</div>'
      +'<input type="number" id="m_'+idR+'" value="'+vR+'" placeholder="'+(lR||'—')+'" step=".5" style="margin:0;padding:10px;font-size:16px;font-weight:600;width:100%;">'
      +'</div>'
      +'<div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:4px;"><span>SINISTRA</span>'
      +(dL!==null?'<span style="color:'+colDiff(dL)+';font-weight:700;">'+(dL>0?'+':'')+dL.toFixed(1)+'cm</span>':(lL>0?'<span>prec. '+lL+'cm</span>':''))
      +'</div>'
      +'<input type="number" id="m_'+idL+'" value="'+vL+'" placeholder="'+(lL||'—')+'" step=".5" style="margin:0;padding:10px;font-size:16px;font-weight:600;width:100%;">'
      +'</div>'
      +'</div>'
      +'</div>';
  }
  function secHdr(lbl,col){
    return '<div style="display:flex;align-items:center;gap:8px;margin:16px 0 10px;">'
      +'<div style="flex:1;height:1px;background:var(--bord);"></div>'
      +'<span style="font-size:10px;font-weight:700;color:'+col+';letter-spacing:2px;text-transform:uppercase;white-space:nowrap;">'+lbl+'</span>'
      +'<div style="flex:1;height:1px;background:var(--bord);"></div>'
      +'</div>';
  }
  const waistArr=getMeasureArr('waist');
  const hipsArr=getMeasureArr('hips');
  const armArr=getMeasureArr('arm_r').length>=2?getMeasureArr('arm_r'):getMeasureArr('arm');
  const thighArr=getMeasureArr('thigh_r').length>=2?getMeasureArr('thigh_r'):getMeasureArr('thigh');
  const bfArr=getMeasureArr('bodyfat');
  const hasMeasures=Object.keys(ST.measures).length>0;
  let chartsHtml='';
  if(waistArr.length>=2||hipsArr.length>=2){
    chartsHtml+='<div class="card"><span class="lbl">VITA & FIANCHI</span>';
    if(waistArr.length>=2) chartsHtml+='<div style="font-size:10px;color:var(--acc);font-weight:700;margin-bottom:3px;">VITA</div>'+svg(waistArr,'v','var(--acc)',70);
    if(hipsArr.length>=2) chartsHtml+='<div style="font-size:10px;color:var(--purp);font-weight:700;margin:8px 0 3px;">FIANCHI</div>'+svg(hipsArr,'v','var(--purp)',70);
    chartsHtml+='</div>';
  }
  if(armArr.length>=2){
    chartsHtml+='<div class="card"><span class="lbl">BICIPITE DX</span>'+svg(armArr,'v','var(--blu)',70)+'</div>';
  }
  if(thighArr.length>=2){
    chartsHtml+='<div class="card"><span class="lbl">COSCIA DX</span>'+svg(thighArr,'v','var(--ora)',70)+'</div>';
  }
  if(bfArr.length>=2){
    chartsHtml+='<div class="card"><span class="lbl">% GRASSO CORPOREO</span>'+svg(bfArr,'v','var(--yel)',70)+'</div>';
  }
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">'
    +'<div><div class="bebas" style="font-size:28px;">MISURE</div>'
    +'<div style="font-size:11px;color:var(--mut);">'+(currentDateStr===getToday()?'Oggi':currentDateStr)+(prevDate&&prevDate!==currentDateStr?' &middot; ultima: '+prevDate:'')+'</div></div>'
    +'<button onclick="saveMeasures()" style="background:var(--acc);color:#000;border:none;border-radius:12px;padding:12px 18px;font-family:\"Bebas Neue\";font-size:16px;cursor:pointer;">SALVA</button>'
    +'</div>'
    +(!hasMeasures?'<div class="card" style="text-align:center;padding:24px;border-style:dashed;"><div style="font-size:36px;margin-bottom:8px;">📐</div><div style="font-size:14px;font-weight:600;margin-bottom:6px;">Prima misurazione</div><div style="font-size:12px;color:var(--mut);line-height:1.6;">Inserisci le misure e salva. I grafici appariranno dopo 2+ misurazioni.</div></div>':'')
    +'<div class="card" style="padding:18px;">'
    + (hasMeasures?'<div style="font-size:12px;color:var(--mut);margin-bottom:14px;padding:8px 12px;background:rgba(197,241,53,.05);border-radius:8px;line-height:1.5;">Le frecce mostrano la variazione vs ultima misurazione. <span style="color:var(--acc);">&#8595; verde</span> = riduzione, <span style="color:var(--red);">&#8593; rosso</span> = aumento</div>':'')
    + secHdr('CIRCONFERENZE','var(--acc)')
    + mField('neck','Collo','Meta collo - orizzontale')
    + mField('shoulders','Spalle','Larghezza massima - acromi')
    + mField('chest','Petto','Linea capezzoli - fine espirazione')
    + mField('waist','Vita','Punto piu stretto - ombelico')
    + mField('abdomen','Addome','2 dita sotto lombelico')
    + mField('hips','Fianchi','Massima circonferenza glutei')
    + secHdr('BRACCIA','var(--blu)')
    + mPair('arm_r','arm_l','Bicipite rilassato','Braccio disteso - muscolo a riposo')
    + mPair('arm_r_flex','arm_l_flex','Bicipite contratto','Braccio flesso a 90 gradi - max contrazione')
    + mPair('forearm_r','forearm_l','Avambraccio','Massima circonferenza - sotto il gomito')
    + secHdr('GAMBE','var(--ora)')
    + mPair('thigh_r','thigh_l','Coscia','Massima circonferenza - parte alta')
    + mPair('calf_r','calf_l','Polpaccio','Massima circonferenza del polpaccio')
    + secHdr('COMPOSIZIONE','var(--purp)')
    + mField('bodyfat','% Grasso Corporeo','Stima con plicometro o bilancia impedenziometrica (opzionale)','%')
    + '<button onclick="saveMeasures()" style="width:100%;background:var(--acc);color:#000;border:none;border-radius:12px;padding:14px;font-family:\"Bebas Neue\";font-size:20px;cursor:pointer;margin-top:6px;">SALVA MISURE</button>'
    +'</div>'
    +(chartsHtml?'<div class="bebas" style="font-size:18px;color:var(--mut);margin:14px 0 10px;letter-spacing:1px;">GRAFICI PROGRESSIONE</div>'+chartsHtml:'');
}
window.renderBody = function(cW,mac,theme,pWeek,sx){
  if(!ST.chartFilter) ST.chartFilter=30;
  const wArr=ST.h.slice(-ST.chartFilter);
  const wLogF=ST.wLog.filter(w=>!w.isRest).slice(-ST.chartFilter);
  const lost=(ST.h[0]?.w||cW)-cW;
  const avg7=ST.h.length>=7?((ST.h.slice(-7).reduce((a,b)=>a+b.w,0))/7).toFixed(1):cW;
  // Ultima misurazione disponibile (backward compat: arm→arm_r, thigh→thigh_r)
  const sortedDates=Object.keys(ST.measures).sort();
  const lastDate=sortedDates.filter(d=>d<currentDateStr).pop()||sortedDates[sortedDates.length-1]||null;
  const lastM=lastDate?{...ST.measures[lastDate]}:{};
  if(!lastM.arm_r&&lastM.arm) lastM.arm_r=lastM.arm;
  if(!lastM.thigh_r&&lastM.thigh) lastM.thigh_r=lastM.thigh;
  const todayM=ST.measures[currentDateStr]||{};
  // Helper: mostra input + confronto vs ultima misurazione
  function mField(id,label,hint,unit='cm'){
    const todayVal=todayM[id]||'';
    const lastVal=lastM[id]||0;
    const diff=todayVal&&lastVal?parseFloat(todayVal)-lastVal:null;
    const arrow=diff===null?'':`<span style="font-size:11px;color:${diff<0?'var(--acc)':diff>0?'var(--red)':'var(--mut)'};margin-left:4px;">${diff>0?'+':''}${diff.toFixed(1)} ${unit} ${diff<0?'↓':diff>0?'↑':'='}</span>`;
    const lastTxt=lastVal>0?`<span style="font-size:10px;color:var(--mut);">prec. ${lastVal}${unit}</span>${arrow}`:'';
    return`<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
        <span style="font-size:11px;font-weight:700;color:var(--mut);letter-spacing:1px;text-transform:uppercase;">${label}</span>
        ${lastTxt}
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <input type="number" id="m_${id}" value="${todayVal}" placeholder="${lastVal||'—'}" step="${unit==='%'?'.1':'.5'}" style="margin:0;padding:9px 12px;font-size:15px;font-weight:600;flex:1;">
        <span style="font-size:12px;color:var(--mut);white-space:nowrap;">${unit}</span>
      </div>
      ${hint?`<div style="font-size:10px;color:var(--mut);margin-top:3px;padding-left:2px;">${hint}</div>`:''}
    </div>`;
  }
  // Helper: coppia bilaterale (dx/sx affiancati)
  function mPair(idR,idL,labelBase,hint=''){
    const vR=todayM[idR]||'',vL=todayM[idL]||'';
    const lR=lastM[idR]||0,lL=lastM[idL]||0;
    const dR=vR&&lR?parseFloat(vR)-lR:null;
    const dL=vL&&lL?parseFloat(vL)-lL:null;
    const arrowR=dR===null?'':`<span style="font-size:10px;color:${dR<0?'var(--acc)':dR>0?'var(--red)':'var(--mut)'};">${dR>0?'+':''}${dR.toFixed(1)}</span>`;
    const arrowL=dL===null?'':`<span style="font-size:10px;color:${dL<0?'var(--acc)':dL>0?'var(--red)':'var(--mut)'};">${dL>0?'+':''}${dL.toFixed(1)}</span>`;
    return`<div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">${labelBase}</div>
      ${hint?`<div style="font-size:10px;color:var(--mut);margin-bottom:6px;">${hint}</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:3px;"><span>DESTRA</span><span>${lR>0?`prec. ${lR} cm`:''} ${arrowR}</span></div>
          <input type="number" id="m_${idR}" value="${vR}" placeholder="${lR||'—'}" step=".5" style="margin:0;padding:9px;font-size:15px;font-weight:600;width:100%;">
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-bottom:3px;"><span>SINISTRA</span><span>${lL>0?`prec. ${lL} cm`:''} ${arrowL}</span></div>
          <input type="number" id="m_${idL}" value="${vL}" placeholder="${lL||'—'}" step=".5" style="margin:0;padding:9px;font-size:15px;font-weight:600;width:100%;">
        </div>
      </div>
    </div>`;
  }
  // Helper: mini chart misura
  function mChart(field,label,col){
    const arr=getMeasureArr(field);
    if(arr.length<2) return '';
    return`<div style="margin-top:12px;"><div style="font-size:10px;color:${col};font-weight:700;letter-spacing:1px;margin-bottom:4px;">${label}</div>${svg(arr,'v',col,75)}</div>`;
  }
  const focusObj=FOCUS_LIST.find(f=>f.id===(ST.p.focus||'total'))||FOCUS_LIST[0];
  return`
  <div class="bebas" style="font-size:26px;margin-bottom:4px;">BODY ANALYTICS</div>
  <div style="font-size:11px;color:var(--mut);margin-bottom:14px;">Focus: <span style="color:${focusObj.col};font-weight:700;">${focusObj.icon} ${focusObj.label}</span> · Sett.${pWeek}</div>
  <div style="display:flex;border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--bord);">
    <button class="flt-btn ${ST.chartFilter===7?'on':''}" onclick="setChartFlt(7)">7 GG</button>
    <button class="flt-btn ${ST.chartFilter===30?'on':''}" onclick="setChartFlt(30)">30 GG</button>
    <button class="flt-btn ${ST.chartFilter===90?'on':''}" onclick="setChartFlt(90)">90 GG</button>
    <button class="flt-btn ${ST.chartFilter===180?'on':''}" onclick="setChartFlt(180)">6 MESI</button>
  </div>
  <div class="g2" style="margin-bottom:10px;">
    ${[['KG PERSI',`${lost>=0?'-':'+'}${Math.abs(lost).toFixed(1)}kg`,'var(--acc)'],['MANCANTI',Math.abs(ST.p.g-cW).toFixed(1)+' kg','var(--ora)'],['MEDIA 7G',avg7+' kg','var(--blu)'],['SESSIONI',wLogF.length,'var(--purp)']].map(([l,v,col])=>`<div class="card" style="text-align:center;padding:14px;border-top:3px solid ${col};"><div class="bebas" style="font-size:28px;color:${col};line-height:1;">${v}</div><div style="font-size:9px;color:var(--mut);letter-spacing:1.5px;margin-top:2px;">${l}</div></div>`).join('')}
  </div>
  <div class="card"><span class="lbl">PESO CORPOREO (${ST.chartFilter} gg)</span>${svg(wArr,'w',theme,110,ST.p.g)}</div>
  <div class="card" style="border:1px dashed var(--bord);text-align:center;padding:14px;">
    <div style="font-size:13px;color:var(--mut);margin-bottom:8px;">Vuoi inserire le tue circonferenze corporee?</div>
    <button class="btn-s btn-action" style="padding:10px 18px;" onclick="ST.tab='measures';render()">📐 VAI A MISURE</button>
  </div>
  <!-- ═══ GRAFICI PROGRESSI MISURE ═══ -->
  ${(()=>{
    const waistArr=getMeasureArr('waist');
    const hipsArr=getMeasureArr('hips');
    const armRArr=getMeasureArr('arm_r')||getMeasureArr('arm');
    const armRFlexArr=getMeasureArr('arm_r_flex');
    const thighArr=getMeasureArr('thigh_r')||getMeasureArr('thigh');
    const bfArr=getMeasureArr('bodyfat');
    let charts='';
    // Vita + Fianchi
    if(waistArr.length>=2||hipsArr.length>=2){
      charts+=`<div class="card"><div class="r" style="margin-bottom:8px;"><span class="lbl" style="margin:0;">VITA & FIANCHI</span><span style="font-size:11px;color:var(--mut);">${waistArr.length>=1?`Vita: ${waistArr[waistArr.length-1].v}cm`:''}${hipsArr.length>=1?' · Fianchi: '+hipsArr[hipsArr.length-1].v+'cm':''}</span></div>
        ${waistArr.length>=2?`<div style="font-size:10px;color:var(--acc);margin-bottom:2px;font-weight:700;">▼ VITA</div>${svg(waistArr,'v','var(--acc)',75)}`:''}
        ${hipsArr.length>=2?`<div style="font-size:10px;color:var(--purp);margin-top:8px;margin-bottom:2px;font-weight:700;">▼ FIANCHI</div>${svg(hipsArr,'v','var(--purp)',75)}`:''}
      </div>`;
    }
    // Braccia
    if(armRArr.length>=2||armRFlexArr.length>=2){
      charts+=`<div class="card"><div class="r" style="margin-bottom:8px;"><span class="lbl" style="margin:0;">BICIPITE DX</span><span style="font-size:11px;color:var(--mut);">${armRArr.length>=1?`Rilassato: ${armRArr[armRArr.length-1].v}cm`:''}${armRFlexArr.length>=1?' · Contratto: '+armRFlexArr[armRFlexArr.length-1].v+'cm':''}</span></div>
        ${armRArr.length>=2?`<div style="font-size:10px;color:var(--blu);margin-bottom:2px;font-weight:700;">▼ RILASSATO</div>${svg(armRArr,'v','var(--blu)',70)}`:''}
        ${armRFlexArr.length>=2?`<div style="font-size:10px;color:var(--acc);margin-top:8px;margin-bottom:2px;font-weight:700;">▼ CONTRATTO</div>${svg(armRFlexArr,'v','var(--acc)',70)}`:''}
      </div>`;
    }
    // Coscia
    if(thighArr.length>=2){
      charts+=`<div class="card"><div class="r" style="margin-bottom:8px;"><span class="lbl" style="margin:0;">COSCIA DX</span><span style="font-size:11px;color:var(--ora);">${thighArr[thighArr.length-1].v}cm</span></div>${svg(thighArr,'v','var(--ora)',75)}</div>`;
    }
    // % Grasso
    if(bfArr.length>=2){
      charts+=`<div class="card"><div class="r" style="margin-bottom:8px;"><span class="lbl" style="margin:0;">% GRASSO CORPOREO</span><span style="font-size:11px;color:var(--yel);">${bfArr[bfArr.length-1].v}%</span></div>${svg(bfArr,'v','var(--yel)',75)}</div>`;
    }
    if(!charts) charts=`<div class="card" style="text-align:center;padding:20px;color:var(--mut);font-size:13px;">Inserisci almeno 2 misurazioni per vedere i grafici di progressione</div>`;
    return`<div class="bebas" style="font-size:18px;color:var(--mut);margin:16px 0 10px;letter-spacing:1px;">📈 TREND MISURE</div>${charts}`;
  })()}
  ${wLogF.length>=2?`<div class="card"><span class="lbl">VOLUME ALLENAMENTI (KG)</span>${svg(wLogF,'vol',theme,90)}</div>`:''}

  <!-- PUNTO 6: ANALISI GRANULARE PER ESERCIZIO -->
  ${(() => {
    const allStats = buildExerciseStats(ST.wHistory || {});
    // FIX 3: mostra solo esercizi con almeno un valore numerico registrato
    // (kg, sec, o reps > 0). Escludo quelli "fatti" ma senza dati reali.
    const exStats = allStats.filter(s => s.maxKg > 0 || s.maxSec > 0 || s.maxReps > 0);
    if (exStats.length === 0) return '';
    const top = exStats.slice(0, 8); // top 8 esercizi più frequenti con dati
    return `<div class="bebas" style="font-size:18px;color:var(--mut);margin:16px 0 10px;letter-spacing:1px;">📊 PROGRESSI PER ESERCIZIO</div>
    <div class="card" style="padding:14px;">
      <div style="font-size:11px;color:var(--mut);line-height:1.5;margin-bottom:12px;">Top ${top.length} esercizi con dati registrati. Il <strong style="color:var(--acc);">1RM stimato</strong> è il peso massimo teorico per una singola ripetizione (formula Epley).</div>
      ${top.map(s => {
        const unit = s.unit || 'kg';
        const isKg = unit === 'kg' && s.maxKg > 0;
        const isSec = unit === 'sec' && s.maxSec > 0;
        const isReps = unit === 'reps' && s.maxReps > 0;
        const progCol = s.progressPct > 0 ? 'var(--acc)' : s.progressPct < 0 ? 'var(--red)' : 'var(--mut)';
        const progText = s.progressPct != null ? `${s.progressPct > 0 ? '+' : ''}${s.progressPct}%` : '—';
        return `<div style="padding:12px 0;border-bottom:1px solid var(--bord);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <div style="flex:1;min-width:0;padding-right:8px;">
              <div style="font-size:13px;font-weight:700;color:var(--text);line-height:1.3;">${s.name}</div>
              <div style="font-size:10px;color:var(--mut);margin-top:2px;">${s.mus} · ${s.sessions} sessioni</div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              ${isKg ? `<div class="bebas" style="font-size:22px;color:var(--acc);line-height:1;">${s.maxKg}<span style="font-size:11px;color:var(--mut);">kg PR</span></div>` : ''}
              ${isSec ? `<div class="bebas" style="font-size:22px;color:var(--blu);line-height:1;">${s.maxSec}<span style="font-size:11px;color:var(--mut);">s PR</span></div>` : ''}
              ${isReps ? `<div class="bebas" style="font-size:22px;color:var(--purp);line-height:1;">${s.maxReps}<span style="font-size:11px;color:var(--mut);">reps PR</span></div>` : ''}
              ${!isKg && !isSec && !isReps ? `<div style="font-size:11px;color:var(--mut);">nessun dato</div>` : ''}
            </div>
          </div>
          ${isKg ? `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px;">
            <div style="background:var(--bg);padding:6px 8px;border-radius:6px;text-align:center;">
              <div style="font-size:9px;color:var(--mut);letter-spacing:1px;">1RM STIM.</div>
              <div style="font-size:13px;font-weight:700;color:var(--yel);">${s.best1RM}kg</div>
            </div>
            <div style="background:var(--bg);padding:6px 8px;border-radius:6px;text-align:center;">
              <div style="font-size:9px;color:var(--mut);letter-spacing:1px;">VOL. 7GG</div>
              <div style="font-size:13px;font-weight:700;color:var(--ora);">${s.weekVolume.toLocaleString('it-IT')}kg</div>
            </div>
            <div style="background:var(--bg);padding:6px 8px;border-radius:6px;text-align:center;">
              <div style="font-size:9px;color:var(--mut);letter-spacing:1px;">PROGR.</div>
              <div style="font-size:13px;font-weight:700;color:${progCol};">${progText}</div>
            </div>
          </div>` : ''}
          ${isKg && s.first && s.last && s.first !== s.last ? `<div style="font-size:10px;color:var(--mut);margin-top:6px;line-height:1.4;">Da <strong style="color:var(--text);">${s.first}kg</strong> → <strong style="color:${progCol};">${s.last}kg</strong> ${s.progressPct >= 10 ? '🔥' : s.progressPct > 0 ? '📈' : s.progressPct < 0 ? '📉' : ''}</div>` : ''}
        </div>`;
      }).join('')}
      ${exStats.length > 8 ? `<div style="font-size:11px;color:var(--mut);text-align:center;padding-top:10px;">... e altri ${exStats.length - 8} esercizi meno frequenti</div>` : ''}
    </div>`;
  })()}

  <div class="card">
    <span class="lbl">DIARIO ALLENAMENTI (${ST.wLog.filter(w=>!w.isRest).length} sessioni)</span>

          <div><span class="lbl" style="font-size:10px;">SERIE</span><input id="cwExSets" type="number" min="1" max="10" value="${sr.sets}" style="margin:0;text-align:center;"></div>
          <div><span class="lbl" style="font-size:10px;">REPS</span><input id="cwExReps" type="text" maxlength="15" value="${sr.reps}" style="margin:0;text-align:center;"></div>
          <div><span class="lbl" style="font-size:10px;">RECUPERO (S)</span><input id="cwExRest" type="number" min="0" max="600" value="${sr.rest}" style="margin:0;text-align:center;"></div>
        </div>
        <div style="font-size:11px;color:var(--mut);margin-bottom:14px;line-height:1.5;">💡 Suggeriti per il tuo focus: ${sr.note||sr.sets+'×'+sr.reps+', recupero '+sr.rest+'s'}.</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-action" style="flex:1;padding:12px;" onclick="ST.sheetData.subSheet=null;render();">ANNULLA</button>
          <button class="btn" style="flex:1;padding:12px;background:var(--purp);color:#fff;" onclick="saveCustomExerciseToDraft()">AGGIUNGI</button>
        </div>
      </div></div>`;
    }
    // Sheet principale: editor scheda
    return`<div class="sh-ov" onclick="if(event.target===this)closeSheet()"><div class="sh"><div class="sh-h"></div>
      <div class="bebas" style="font-size:22px;margin-bottom:14px;">${d.isNew?'+ NUOVA SCHEDA':'✏️ MODIFICA SCHEDA'}</div>

      <!-- Nome scheda -->
      <span class="lbl">NOME SCHEDA</span>
      <input id="cwName" type="text" maxlength="60" value="${escapeHtml(draft.name||'')}" placeholder="Es. La mia scheda spalle" style="margin-bottom:10px;">

      <!-- Emoji -->
      <span class="lbl" style="margin-bottom:6px;">EMOJI</span>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
        ${emojis.map(e=>`<button class="btn-s" style="font-size:18px;padding:8px 12px;background:${draft.emoji===e?'rgba(167,139,250,.2)':'var(--surf)'};border:1.5px solid ${draft.emoji===e?'var(--purp)':'var(--bord)'};color:var(--text);" onclick="setCustomWorkoutEmoji('${e}')">${e}</button>`).join('')}
      </div>

      <!-- Lista esercizi attuali -->
      <span class="lbl" style="margin-bottom:6px;">ESERCIZI (${draft.exercises.length})</span>
      ${draft.exercises.length===0?`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut);background:var(--surf);border-radius:10px;margin-bottom:10px;">Nessun esercizio. Aggiungine almeno 1.</div>`:
      `<div style="margin-bottom:10px;">
        ${draft.exercises.map((e,i)=>{
          const exData=e.exId?EX[e.exId]:null;
          const name=e.isCustom?e.customName:(exData?.name||'?');
          const mus=e.isCustom?e.customMus:(exData?.mus||'');
          return `<div style="background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:10px 12px;margin-bottom:6px;">
            <div class="r" style="margin-bottom:8px;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:600;color:var(--text);">${escapeHtml(name)}${e.isCustom?' <span style=\"font-size:9px;color:var(--purp);background:rgba(167,139,250,.15);padding:1px 6px;border-radius:4px;font-weight:700;\">CUSTOM</span>':''}</div>
                <div style="font-size:10px;color:var(--mut);">${escapeHtml(mus)}</div>
              </div>
              <button class="btn-s" style="background:var(--red);color:#fff;font-size:11px;padding:4px 8px;" onclick="removeExerciseFromDraft(${i})">✕</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
              <div><div style="font-size:9px;color:var(--mut);letter-spacing:1px;">SERIE</div><input type="number" min="1" max="10" value="${e.sets||3}" oninput="updateExerciseInDraft(${i},'sets',this.value)" style="margin:0;padding:6px;text-align:center;font-size:13px;font-weight:700;"></div>
              <div><div style="font-size:9px;color:var(--mut);letter-spacing:1px;">REPS</div><input type="text" maxlength="15" value="${escapeHtml(e.reps||'8-12')}" oninput="updateExerciseInDraft(${i},'reps',this.value)" style="margin:0;padding:6px;text-align:center;font-size:13px;font-weight:700;"></div>
              <div><div style="font-size:9px;color:var(--mut);letter-spacing:1px;">RECUP. (S)</div><input type="number" min="0" max="600" value="${e.rest||90}" oninput="updateExerciseInDraft(${i},'rest',this.value)" style="margin:0;padding:6px;text-align:center;font-size:13px;font-weight:700;"></div>
            </div>
          </div>`;
        }).join('')}
      </div>`}

      <!-- Volume info -->
      <div style="background:rgba(167,139,250,.06);border:1.5px solid ${volCol};border-radius:10px;padding:10px 12px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:11px;color:var(--mut);">Volume totale: <strong style="color:${volCol};">${vol.totalSets} serie</strong></div>
          <div style="font-size:11px;color:var(--mut);">Min consigliato: ${minVol}</div>
        </div>
      </div>

      <!-- Aggiungi esercizio: 2 bottoni -->
      <div style="background:rgba(167,139,250,.06);border:1.5px solid var(--purp);border-radius:12px;padding:12px;margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--purp);letter-spacing:1px;margin-bottom:8px;">+ AGGIUNGI ESERCIZIO</div>
        <select id="cwExSelect" style="margin-bottom:8px;font-size:13px;padding:10px;">
          <option value="">— Scegli dalla libreria —</option>
          ${Object.keys(EX).filter(k=>!EX[k].isWarmup&&!EX[k].isCooldown&&EX[k].cat&&!['warmup','cooldown','cardio'].includes(EX[k].cat)).sort((a,b)=>EX[a].cat.localeCompare(EX[b].cat)).map(k=>`<option value="${k}">${EX[k].cat?.toUpperCase()} · ${EX[k].name}</option>`).join('')}
        </select>
        <div style="display:flex;gap:8px;">
          <button class="btn-s btn-action" style="flex:1;padding:10px;font-size:12px;" onclick="addLibraryExerciseToDraft()">+ DA LIBRERIA</button>
          <button class="btn-s" style="flex:1;background:var(--purp);color:#fff;padding:10px;font-size:12px;" onclick="openExerciseCreator()">+ CREA TUO</button>
        </div>
      </div>

      <!-- Azioni -->
      <div style="display:flex;gap:8px;">
        <button class="btn btn-action" style="flex:1;padding:12px;" onclick="closeSheet()">ANNULLA</button>
        <button class="btn" style="flex:1;padding:12px;background:var(--purp);color:#fff;" onclick="saveCustomWorkout()">SALVA</button>
      </div>
    </div></div>`;
  })():'';
  // Sheets extra (legacy rimossi: ora c'è il drawer laterale)
  const moreSheetH='';
  const shortPickH='';
  // ── NUOVA NAVIGAZIONE: Drawer laterale + topbar con titolo sezione ──
  const NAV_ITEMS=[
    {id:'home',ic:'🏠',lbl:'Home'},
    {id:'work',ic:'🏋️',lbl:'Allenamento'},
    {id:'diet',ic:'🥗',lbl:'Alimentazione'},
    {id:'body',ic:'📊',lbl:'Analisi & Progressi'},
    {id:'measures',ic:'📐',lbl:'Misure Corporee'},
    {id:'coach',ic:'🤖',lbl:'AI Coach'},
    {id:'share',ic:'📤',lbl:'Condividi App'},
    {id:'set',ic:'⚙️',lbl:'Configurazione'},
  ];
  const curNav=NAV_ITEMS.find(n=>n.id===ST.tab)||NAV_ITEMS[0];
  const drawerH=`<div class="drawer-ov ${window.drawerOpen?'on':''}" onclick="closeDrawer()"></div>
  <aside class="drawer ${window.drawerOpen?'on':''}">
    <div class="drawer-h">
      <div class="lg">FIT<span style="color:var(--text)">TRACKER</span></div>
      <div class="sub">ADAPTIVE AI COACH</div>
    </div>
    <nav class="drawer-list">
      ${NAV_ITEMS.map(n=>`<div class="dni ${ST.tab===n.id?'on':''}" onclick="gotoTab('${n.id}')">
        <span class="dni-ic">${n.ic}</span>
        <span class="dni-lbl">${n.lbl}</span>
        <span class="dni-arr">▸</span>
      </div>`).join('')}
    </nav>
    <div class="drawer-footer">
      <div class="uname">Connesso come <strong>${AU.user||'—'}</strong></div>
      <button class="btn-s btn-action" style="width:100%;padding:10px;font-size:13px;" onclick="closeDrawer();doLogout()">🚪 Logout</button>
    </div>
  </aside>`;
  let H=drawerH+`<div class="topbar">
    <button class="hamb" onclick="toggleDrawer()" aria-label="Menu"><span class="hamb-bars"><span></span><span></span><span></span></span></button>
    <div class="tb-title"><span class="acc">${curNav.ic}</span> ${curNav.lbl.toUpperCase()}</div>
    <div style="display:flex;align-items:center;gap:6px;">
      ${currentDateStr!==getToday()?`<button class="btn-s" style="padding:6px 10px;font-size:11px;font-weight:700;background:var(--ora);color:#fff;border:none;letter-spacing:1px;" onclick="changeCurrentDate(getToday())">OGGI</button>`:''}
      <input type="date" value="${currentDateStr}" max="${getToday()}" onchange="changeCurrentDate(this.value)" style="width:auto;margin:0;padding:6px 8px;font-size:12px;border:1.5px solid ${currentDateStr!==getToday()?'var(--ora)':'var(--bord)'};border-radius:8px;color:${currentDateStr!==getToday()?'var(--ora)':'var(--text)'};background:var(--surf);font-weight:700;outline:none;cursor:pointer;">
    </div>
  </div>
  ${ST.stopwatch && sportById(ST.stopwatch.sportId) ? (() => {
    // FIX 2: overlay cronometro attivo (visibile in tutte le tab)
    const sp=sportById(ST.stopwatch.sportId);
    const running=ST.stopwatch.running;
    const totalMs=(ST.stopwatch.elapsed||0)+(running&&ST.stopwatch.startTs?(Date.now()-ST.stopwatch.startTs):0);
    const mins=Math.floor(totalMs/60000);
    const secs=Math.floor((totalMs%60000)/1000);
    const display=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
    const kcal=calcSportKcal(ST.stopwatch.sportId, totalMs/60000, currentWeightKg());
    return `<div style="position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:90;background:linear-gradient(135deg,#0c1a00,#0a1000);border:2px solid var(--acc);border-radius:14px;padding:10px 16px;box-shadow:0 4px 20px rgba(0,0,0,.6);display:flex;gap:12px;align-items:center;min-width:280px;max-width:calc(100% - 24px);">
      <div style="font-size:22px;">${sp.emo}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1px;">${escapeHtml(sp.name).toUpperCase()}${running?' · LIVE':' · PAUSA'}</div>
        <div style="display:flex;gap:10px;align-items:baseline;">
          <div id="stopwatchDisplay" style="font-family:monospace;font-size:22px;font-weight:700;color:${running?'var(--acc)':'var(--ora)'};line-height:1;">${display}</div>
          <div id="stopwatchKcal" style="font-size:12px;color:var(--acc);font-weight:700;">~${kcal} kcal</div>
        </div>
      </div>
      ${running ? `<button onclick="pauseStopwatch();render();" style="background:var(--ora);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;">⏸</button>` : `<button onclick="resumeStopwatch();render();" style="background:var(--gre);color:#000;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;">▶</button>`}
      <button onclick="stopAndSaveStopwatch()" style="background:var(--blu);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;">⏹ FINE</button>
      <button onclick="cancelStopwatch();render();" style="background:transparent;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 8px;font-size:10px;cursor:pointer;">✕</button>
    </div>` ;
  })() : ''}
  <div class="content"><div class="wrap">`;
  if(!ST.p){H+=renderSetup();H+=`</div></div>`;root.innerHTML=H+sheetH;
    // PUNTO 11: inizializza visibilità campi form registrazione
    setTimeout(()=>{if(window.toggleSessVisibility) toggleSessVisibility();},0);
    return;
  }
  if(ST.tab==='home') H+=renderHome(currentDateStr,cW,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='work') H+=renderWork(currentDateStr,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='diet') H+=renderDiet(currentDateStr,mac,an,sx,todayWoId);
  else if(ST.tab==='body') H+=renderBody(cW,mac,theme,pWeek,sx);
  else if(ST.tab==='measures') H+=renderMeasures(cW,mac,theme,pWeek,sx);
  else if(ST.tab==='coach') H+=renderCoach();
  else if(ST.tab==='share') H+=renderShare();
  else if(ST.tab==='set') H+=renderSettings(mac);
  H+=`</div></div>`;root.innerHTML=H+sheetH+moreSheetH+shortPickH+renderTour()+renderDisclaimer();
  if(ST.tab==='coach') setTimeout(()=>{const c=el('chatArea');if(c)c.scrollTop=c.scrollHeight;},50);
  // PUNTO 11: inizializza visibilità campi in Configurazione
  if(ST.tab==='set') setTimeout(()=>{if(window.toggleSessVisibilitySettings) toggleSessVisibilitySettings();},0);
}
// ── BOOT — Usa Firebase Auth listener ──
window.bootApp = async function() {
  try {
    window.__initAuthListener();
  } catch(e) {
    console.error("Boot Error", e);
    render();
  }
}
let _initAttempts=0;
const _startCheck=setInterval(()=>{
  _initAttempts++;
  if(window.DB && window.FBAuth){
    clearInterval(_startCheck);
    bootApp();
  } else if(_initAttempts>60){
    clearInterval(_startCheck);
    alert('Impossibile connettersi a Firebase. Ricarica la pagina.');
    renderAuth(document.getElementById('app'));
  }
},100);
</script>
</body>
</html>
