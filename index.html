<style>
:root {
  --bg: #09090b;
  --surf: #121214;
  --card: #18181b;
  --bord: #27272a;
  --acc: #c5f135;
  --acc-glow: rgba(197, 241, 53, 0.2);
  --ora: #ff6835;
  --blu: #60a5fa;
  --red: #ff4757;
  --purp: #a78bfa;
  --gre: #4ade80;
  --yel: #fbbf24;
  --text: #f4f4f5;
  --mut: #a1a1aa;
  --dim: #27272a;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior: none; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 84px; overflow-x: hidden; }
.bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
.wrap { padding: 16px; max-width: 500px; margin: 0 auto; }

/* LOADING SPINNER */
.loader-wrap { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); position: fixed; top: 0; left: 0; width: 100%; z-index: 9999; }
.spinner { width: 50px; height: 50px; border: 4px solid var(--bord); border-top-color: var(--acc); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; box-shadow: 0 0 20px var(--acc-glow); }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--bord); border-radius: 20px; padding: 20px; margin-bottom: 14px; position: relative; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.card-hi { border-color: var(--acc); background: linear-gradient(145deg, rgba(197,241,53,0.03), transparent); }
.card-warn { border-color: var(--ora); background: linear-gradient(145deg, rgba(255,104,53,0.03), transparent); }
.card-red { border-color: var(--red); background: linear-gradient(145deg, rgba(255,71,87,0.03), transparent); }

/* UTILS */
.r { display: flex; justify-content: space-between; align-items: center; }
.rc { display: flex; align-items: center; gap: 10px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px;}
.g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.lbl { font-size: 11px; font-weight: 700; color: var(--mut); letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 6px; }
.badge { position: absolute; top: 0; right: 0; padding: 4px 14px; border-bottom-left-radius: 16px; font-family: 'Bebas Neue'; font-size: 14px; letter-spacing: 1px; }
.tag { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
.sep { height: 1px; background: var(--bord); margin: 16px 0; }

/* BUTTONS */
.btn { background: var(--acc); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 1px; transition: all 0.2s; display: block; box-shadow: 0 4px 15px var(--acc-glow); }
.btn:active { transform: scale(0.96); box-shadow: 0 2px 5px var(--acc-glow); }
.btn-s { padding: 10px 16px; font-size: 15px; width: auto; border-radius: 10px; border: none; cursor: pointer; font-family: 'Bebas Neue'; letter-spacing: 1px; transition: all 0.15s; }
.btn-s:active { transform: scale(0.95); }
.btn-out { background: transparent; border: 1.5px solid var(--bord); color: var(--mut); box-shadow: none; }
.btn-action { background: var(--surf); border: 1.5px solid var(--bord); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 600; box-shadow: none; }
.btn-dim { background: var(--dim); color: var(--mut); border: 1px solid var(--bord); box-shadow: none; }
.btn-red { background: var(--red); color: #fff; box-shadow: 0 4px 15px rgba(255,71,87,0.2); }
.btn-ora { background: var(--ora); color: #000; box-shadow: 0 4px 15px rgba(255,104,53,0.2); }
.btn-blu { background: var(--blu); color: #000; box-shadow: 0 4px 15px rgba(96,165,250,0.2); }
.btn-gre { background: var(--gre); color: #000; box-shadow: 0 4px 15px rgba(74,222,128,0.2); }

/* CHART FILTERS */
.flt-btn { flex: 1; padding: 8px; font-size: 11px; background: transparent; border: 1.5px solid var(--bord); color: var(--mut); cursor: pointer; transition: 0.2s; font-weight: 700; font-family: 'DM Sans', sans-serif; }
.flt-btn.on { background: var(--acc-glow); color: var(--acc); border-color: var(--acc); }
.flt-btn:first-child { border-radius: 10px 0 0 10px; }
.flt-btn:last-child { border-radius: 0 10px 10px 0; }
.flt-btn:not(:last-child) { border-right: none; }

/* INPUTS */
input, select, textarea { width: 100%; padding: 14px 16px; background: var(--surf); border: 1.5px solid var(--bord); color: var(--text); border-radius: 12px; font-size: 16px; outline: none; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; -webkit-appearance: none; resize: none; transition: border-color 0.2s, box-shadow 0.2s; }
input:focus, select:focus, textarea:focus { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-glow); }
.pw-wrap { position: relative; width: 100%; }
.pw-eye { position: absolute; right: 14px; top: 14px; cursor: pointer; font-size: 18px; opacity: 0.7; transition: 0.2s; user-select: none; }
.pw-eye:hover { opacity: 1; }

input[type=range] { -webkit-appearance: none; background: transparent; padding: 0; margin: 10px 0; border: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--purp); cursor: pointer; margin-top: -8px; box-shadow: 0 0 10px rgba(167,139,250,0.5); }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: var(--bg); border-radius: 4px; border: 1px solid var(--bord); }
::placeholder { color: var(--mut); }
select option { background: var(--card); }

/* NAV */
.tnav { position: fixed; top: 0; left: 0; width: 100%; background: rgba(9,9,11,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--bord); display: flex; justify-content: space-around; z-index: 1000; padding: 0 2px; }
.ni { padding: 14px 0 10px; color: var(--mut); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; border-bottom: 3px solid transparent; width: 16.6%; text-align: center; transition: 0.2s; }
.ni.on { color: var(--text); border-bottom-color: var(--acc); }
.ni .ic { font-size: 18px; line-height: 1; }
.content { padding-top: 76px; }

/* BARS */
.bw { background: var(--bg); border-radius: 99px; overflow: hidden; border: 1px solid var(--bord); }
.bf { border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

/* WORKOUT OVERLAY */
.wo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; overflow-y: auto; display: flex; flex-direction: column; }
.wo-head { position: sticky; top: 0; background: rgba(9,9,11,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--bord); padding: 16px 20px; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.tmr-ring { width: 220px; height: 220px; border-radius: 50%; border: 8px solid var(--acc); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 0 30px rgba(197,241,53,0.15); }
.tmr-ring-rest { border-color: var(--blu); box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 0 30px rgba(96,165,250,0.15); }

/* SET DOTS */
.set-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--dim); border: 2px solid var(--bord); transition: all 0.3s; }
.set-dot.done { background: var(--acc); border-color: var(--acc); box-shadow: 0 0 8px var(--acc-glow); }
.set-dot.current { background: transparent; border-color: var(--acc); box-shadow: 0 0 10px var(--acc-glow); }

/* SHEET */
.sh-ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 3000; display: flex; align-items: flex-end; justify-content: center; }
.sh { background: var(--card); border-radius: 24px 24px 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 24px 20px 40px; border-top: 1px solid var(--bord); }
.sh-h { width: 40px; height: 5px; background: var(--bord); border-radius: 3px; margin: 0 auto 20px; }

/* CHAT */
.bbl { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; margin-bottom: 10px; }
.bbl-u { background: var(--acc); color: #000; border-bottom-right-radius: 4px; align-self: flex-end; font-weight: 500; box-shadow: 0 4px 10px var(--acc-glow); }
.bbl-ai { background: var(--surf); border: 1px solid var(--bord); border-bottom-left-radius: 4px; align-self: flex-start; }

/* AUTH */
.auth-w { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at 50% 0%, rgba(197,241,53,0.08), transparent 70%); }
.atab { flex: 1; padding: 14px; background: none; border: none; color: var(--mut); font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 1.5px; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
.atab.on { color: var(--acc); border-bottom-color: var(--acc); }

/* SEX PICKER */
.sx-btn { flex: 1; padding: 20px 10px; border-radius: 16px; border: 2px solid var(--bord); background: var(--surf); color: var(--mut); cursor: pointer; text-align: center; transition: 0.2s; font-family: 'DM Sans', sans-serif; }
.sx-btn.on { border-color: var(--acc); background: var(--acc-glow); color: var(--text); box-shadow: 0 0 15px var(--acc-glow); }

/* INTOLERANCE CHIPS */
.intol-chip { padding: 10px 16px; border-radius: 12px; border: 1.5px solid var(--bord); background: var(--surf); color: var(--mut); cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
.intol-chip.on { border-color: var(--red); background: rgba(255,71,87,0.15); color: var(--red); box-shadow: 0 0 10px rgba(255,71,87,0.15); }

/* MISC */
.step-n { width: 26px; height: 26px; border-radius: 50%; background: var(--acc); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0; }
.cue-box { background: rgba(197,241,53,0.08); border-left: 4px solid var(--acc); padding: 12px 16px; border-radius: 0 12px 12px 0; font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 8px; }
.err-box { background: rgba(255,71,87,0.1); border: 1px solid var(--red); border-radius: 12px; padding: 14px; font-size: 14px; color: var(--red); margin-bottom: 16px; text-align: center; font-weight: 500; }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--bord); border-radius: 4px; }
@keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

input[type="date"]::-webkit-date-and-time-value { text-align: left; }
input[type="date"]::-webkit-datetime-edit { display: block; padding: 0; }

// ══════════════════════════════════════════════════════════════
// HELPER FUNCTIONS
// ══════════════════════════════════════════════════════════════
function getDefs(sex, loc) { return loc === 'home' ? WO_DEF_HOME : (sex === 'f' ? WO_DEF_F : WO_DEF); }
function buildWeeklyPlan(sessions){
  if(sessions===0) return Array(7).fill('steps');
  if(sessions===1) return ['D','rest','rest','rest','rest','rest','free'];
  if(sessions===2) return ['A','rest','rest','C','rest','rest','free'];
  if(sessions===3) return ['A','rest','B','rest','C','rest','free'];
  if(sessions===4) return ['A','rest','B','C','rest','A','free'];
  if(sessions===5) return ['A','B','rest','C','A','B','free'];
  return ['A','B','C','A','B','C','free'];
}
function calcBMR(w,h,age,sex){ return sex==='m' ? Math.round(10*w+6.25*h-5*age+5) : Math.round(10*w+6.25*h-5*age-161); }
function actMultiplier(s){ if(s===0) return 1.2; if(s<=2) return 1.375; if(s<=4) return 1.55; return 1.725; }
function calcMacros(w,h,age,sex,goal,sessions,analysis){
  const bmr=calcBMR(w,h||170,age||25,sex||'m');
  const tdee=Math.round(bmr*actMultiplier(sessions));
  let kcal=goal.t==='cut'?(tdee-500):(tdee+300);
  kcal+=analysis?.calAdj||0;
  if(goal.t==='cut'&&kcal<w*22) kcal=w*22;
  kcal=Math.round(kcal);
  const prot=Math.round(w*(sex==='f'?1.8:2.2));
  const fat=Math.round(w*(sex==='f'?1.0:0.8));
  const carb=Math.max(50,Math.round((kcal-(prot*4)-(fat*9))/4));
  const effCardio=Math.max(0,Math.min(5,(goal.cardioLevel||1)+(analysis?.cardioAdj||0)));
  return {kcal,prot,fat,carb,bmr,tdee,cardioLevel:effCardio};
}
function analyze(history,goal){
  if(!history||history.length<4) return{status:'new',msg:'Inserisci almeno 4 pesate per l\'AI.',col:'var(--mut)',calAdj:0,cardioAdj:0,alert:null};
  const recent=history.slice(-14);
  const fw=recent[0].w, lw=recent[recent.length-1].w, days=Math.max(1,recent.length);
  const wRate=goal.t==='cut'?((fw-lw)/days*7):((lw-fw)/days*7);
  const tRate=goal.t==='cut'?0.6:0.3;
  const ratio=wRate/tRate;
  const currW=history[history.length-1].w;
  const rem=Math.abs(currW-goal.g);
  const wkNeed=rem/Math.max(0.05,wRate);
  const proj=new Date(); proj.setDate(proj.getDate()+wkNeed*7);
  let status,msg,col,calAdj=0,cardioAdj=0,alert=null;
  if(goal.t==='cut'){
    if(ratio<0.1){status='stalled';msg='🚨 STALLO. Peso bloccato. Ridotte calorie e aumentato cardio.';col='var(--red)';calAdj=-250;cardioAdj=2;alert='stalled';}
    else if(ratio<0.5){status='slow';msg='⚠️ Lento. Riduco le calorie e aggiungo cardio.';col='var(--ora)';calAdj=-150;cardioAdj=1;alert='slow';}
    else if(ratio<0.8){status='good';msg='✅ Progresso nella norma. Il piano funziona.';col='var(--acc)';}
    else if(ratio<=1.3){status='perfect';msg='🎯 Ritmo perfetto! Sei in linea.';col='var(--acc)';}
    else if(ratio<=1.8){status='fast';msg='⚡ Vai veloce. Aumento calorie per i muscoli.';col='var(--yel)';calAdj=150;cardioAdj=-1;alert='fast';}
    else{status='tfast';msg='🛑 Troppo veloce — rischio muscolare. Calorie aumentate.';col='var(--red)';calAdj=250;cardioAdj=-2;alert='tfast';}
  }else{
    if(ratio<0.3){status='slow';msg='⚠️ Massa lenta. Ho aumentato le calorie.';col='var(--ora)';calAdj=200;cardioAdj=-1;}
    else if(ratio<=1.3){status='good';msg='✅ Buona progressione muscolare.';col='var(--acc)';}
    else{status='fast';msg='🍃 Cresci veloce. Aggiungo cardio per il grasso.';col='var(--yel)';cardioAdj=1;calAdj=-100;}
  }
  return {status,msg,col,calAdj,cardioAdj,wRate:wRate.toFixed(2),tRate,ratio:ratio.toFixed(2),proj,wkNeed:wkNeed.toFixed(1),alert};
}
function getSetsReps(type,goal,pw2){
  const cyc=Math.floor((pw2-1)/4), wic=(pw2-1)%4, isD=wic===3;
  if(goal==='cut'){
    if(isD) return {sets:2,reps:'12-15',rest:60,note:'⟳ Deload'};
    if(type==='compound') return {sets:3+Math.min(cyc,1),reps:cyc>=2?'8-10':'10-12',rest:cyc>=2?90:75};
    if(type==='isometric') return {sets:3,reps:'30-45s',rest:45};
    return {sets:3,reps:cyc>=1?'12-15':'15-20',rest:50};
  }else{
    if(isD) return {sets:3,reps:'8-10',rest:90,note:'⟳ Deload'};
    if(type==='compound') return {sets:4+Math.min(cyc,1),reps:cyc>=2?'4-6':cyc>=1?'6-8':'8-10',rest:cyc>=2?180:cyc>=1?150:120};
    if(type==='isometric') return {sets:3,reps:'30-45s',rest:45};
    return {sets:3,reps:cyc>=1?'8-10':'10-12',rest:90};
  }
}
function buildWorkout(woId,goal,pw2,exPrefs,sex,analysis){
  const sch=WO_SCH[woId];
  const defs=getDefs(sex,goal.loc);
  const exercises=sch.slots.map(sl=>{
    const exId=(exPrefs&&exPrefs[sl.k])||defs[sl.k];
    const ex=EX[exId]||EX[defs[sl.k]];
    const sr=getSetsReps(ex.t,goal.t,pw2);
    return {...ex,id:exId,slot:sl.k,cat:sl.cat,...sr};
  });
  if(analysis?.alert==='stalled'){
    exercises.push({...EX['cd_hiit'],id:'cd_hiit',slot:'bonus',cat:'cardio',sets:1,reps:'15 min HIIT',rest:0,isBonus:true});
  }
  return {...sch,exercises};
}
function getSuggest(exId,wHist){
  const entries=Object.keys(wHist||{}).sort().reverse().slice(0,6).map(d=>wHist[d]).filter(s=>s&&s[exId]);
  if(!entries.length) return {kg:null,hint:'Prima volta — calibra'};
  const last=entries[0][exId];
  if(entries.length>=3&&entries.slice(0,3).every(e=>e[exId]?.ok)&&last.kg>0) return {kg:+(last.kg*1.05).toFixed(1),hint:`🔼 Tenta ${+(last.kg*1.05).toFixed(1)} kg (+5%)`};
  return last.kg>0?{kg:last.kg,hint:`Ultima sessione: ${last.kg} kg`}:{kg:null,hint:'Calibra il peso'};
}
function pwk(start){if(!start) return 1;return Math.max(1,Math.ceil((new Date()-new Date(start))/864e5/7));}
function streak(log){
  if(!log?.length) return 0;
  const days=[...new Set(log.map(w=>w.d))].sort().reverse();
  let s=0,p=null;
  for(const d of days){if(!p){p=d;s=1;continue;}const df=(new Date(p)-new Date(d))/864e5;if(df<=3){s++;p=d;}else break;}
  return s;
}
function parseMeanReps(repsStr){
  if(!repsStr) return 10;
  const nums=repsStr.toString().match(/\d+/g);
  if(!nums||nums.length===0) return 10;
  return Math.round(nums.reduce((s,n)=>s+parseInt(n),0)/nums.length);
}
function estimateCalories(text){
  const lower=text.toLowerCase();
  if(lower.match(/\b(niente|nessuno|saltato|non ho mangiato|digiuno|zero|nulla)\b/)) return {kcal:0,foods:['Nessun cibo — pasto saltato'],multiplier:1};
  let multiplier=1;
  for(const[word,mult] of Object.entries(QUANTITY_MAP)){
    if(lower.includes(word)){ if(mult===0) return {kcal:0,foods:['Nessun cibo'],multiplier:0}; if(mult>multiplier) multiplier=mult; }
  }
  const numMatch=lower.match(/\b([2-9]|1[0-9])\s+(pizza|birra|gelato|cornetto|bicchier)/);
  if(numMatch) multiplier=Math.max(multiplier,parseInt(numMatch[1]));
  const sorted=[...FOOD_LIST].sort((a,b)=>Math.max(...b.terms.map(t=>t.length))-Math.max(...a.terms.map(t=>t.length)));
  const results=[];const usedLabels=new Set();
  for(const food of sorted){
    for(const term of food.terms){
      if(lower.includes(term)&&!usedLabels.has(food.label)){ results.push({kcal:food.kcal,label:food.label}); usedLabels.add(food.label); break; }
    }
  }
  if(results.length===0){
    if(lower.match(/\b(cena|pranzo|colazione|pasto|mangiato)\b/)) return {kcal:600,foods:['Pasto generico'],multiplier};
    return {kcal:400,foods:['Alimento non riconosciuto'],multiplier};
  }
  const totalKcal=Math.round(results.reduce((s,r)=>s+r.kcal,0)*multiplier);
  return {kcal:totalKcal,foods:results.map(r=>r.label),multiplier};
}

  if(!ST.measures[currentDateStr]) ST.measures[currentDateStr]={};
  ['chest','waist','hips','arm','thigh','neck'].forEach(f=>{const v=parseFloat(vv('m_'+f));if(v>0)ST.measures[currentDateStr][f]=v;});
  save();alert('Misure salvate!');
}
function setChartFlt(d){ ST.chartFilter=d; render(); }

// Workout session
function startWo(id){
  clearInterval(ST.tmrId);clearInterval(ST.setTmrId);
  ST.aWo=id;ST.step=0;ST.currVol=0;
  ST.woPhase='ready';ST.currentSet=0;
  ST.setElapsed=0;ST.tmr=0;
  // Se c'è un riposo segnato, lo annulliamo in automatico partendo con il wo
  const e=ST.wLog.findIndex(x=>x.d===currentDateStr && x.isRest===true);
  if(e>=0) { ST.wLog.splice(e,1); saveU(); }
  render();
}
function closeWo(){
  if(!confirm('Uscire dall\'allenamento? Il progresso corrente NON verrà salvato.')) return;
  clearInterval(ST.tmrId);clearInterval(ST.setTmrId);
  ST.aWo=null;render();
}
function getWo(){
  const p=pwk(ST.programStart);
  const an=analyze(ST.h,ST.p);
  const sx=AU.profile?.sx||'m';
  return buildWorkout(ST.aWo,ST.p,p,ST.exPrefs,sx,an);
}
function getEx(){return getWo().exercises[ST.step];}

function startSet(){
  ST.woPhase='active';ST.setElapsed=0;
  clearInterval(ST.setTmrId);
  ST.setTmrId=setInterval(()=>{
    ST.setElapsed++;
    const e=el('setTmrUI');
    if(e){const m=Math.floor(ST.setElapsed/60).toString().padStart(2,'0');const s=(ST.setElapsed%60).toString().padStart(2,'0');e.textContent=`${m}:${s}`;}
  },1000);
  render();
}
function completeSet(){
  clearInterval(ST.setTmrId);
  const kg=parseFloat(el('wkW')?.value||0);
  const ex=getEx();
  if(!ST.wHistory[currentDateStr]) ST.wHistory[currentDateStr]={};
  ST.wHistory[currentDateStr][ex.id]={kg:kg>0?kg:null,ok:true};
  if(kg>0) ST.currVol+=Math.round(kg*parseMeanReps(ex.reps));
  ST.currentSet++;
  const totalSets=parseInt(ex.sets)||3;
  if(ST.currentSet>=totalSets){
    ST.woPhase='exercise_done';
    render();
  } else {
    ST.woPhase='rest';ST.tmr=ex.rest||60;
    render();
    ST.tmrId=setInterval(()=>{
      ST.tmr--;
      const e=el('tmrUI');if(e) e.textContent=ST.tmr;
      if(ST.tmr<=0){clearInterval(ST.tmrId);ST.woPhase='ready';render();}
    },1000);
  }
}
function skipRest(){
  clearInterval(ST.tmrId);
  ST.woPhase='ready';render();
}
function advanceExercise(){
  const wo=getWo();
  if(ST.step<wo.exercises.length-1){
    ST.step++;ST.currentSet=0;ST.woPhase='ready';ST.setElapsed=0;
    render();
  } else {
    const e=ST.wLog.findIndex(x=>x.d===currentDateStr);
    if(e>=0) ST.wLog.splice(e,1);
    ST.wLog.push({d:currentDateStr,t:wo.name,vol:ST.currVol,dur:ST.p.dur,isRest:false,woId:ST.aWo});
    ST.wLog.sort((a,b)=>new Date(a.d)-new Date(b.d));
    ST.cheatDebt=0;ST.aWo=null;
    save();
    alert(`🏆 ALLENAMENTO COMPLETATO!\n\nVolume totale: ${ST.currVol} kg\nEsercizi completati: ${wo.exercises.length}`);
  }
}

function openSwap(slot){
  const defs=getDefs(AU.profile?.sx||'m',ST.p.loc);
  const curId=ST.exPrefs[slot]||defs[slot];
  const catKey=Object.keys(EX_G).find(k=>EX_G[k].includes(curId));
  const alts=(catKey?EX_G[catKey]:[curId]).map(id=>({id,...EX[id]}));
  ST.sheet='swap';ST.sheetData={slot,curId,alts};render();
}
function swapEx(slot,newId){if(!ST.exPrefs)ST.exPrefs={};ST.exPrefs[slot]=newId;ST.sheet=null;save();}
function closeSheet(){ST.sheet=null;ST.sheetData=null;render();}

async function sendMsg(){
  const inp=el('aiIn');const msg=inp?.value?.trim();if(!msg||ST.chatLoading) return;
  ST.chatHistory.push({role:'user',content:msg});inp.value='';ST.chatLoading=true;render();
  const cW=ST.h.length?ST.h[ST.h.length-1].w:0;
  const sx=AU.profile?.sx||'m';
  const p2=pwk(ST.programStart);
  const an=analyze(ST.h,ST.p);
  const mac=calcMacros(cW,AU.profile?.ht,AU.profile?.ag,sx,ST.p,ST.p.sessions||3,an);
  const sys=`Sei Marcello, coach fitness e nutrizionista che segue ${AU.user} (${sx==='f'?'donna':'uomo'}). DATI: Peso ${cW}kg → obj ${ST.p.g}kg | Sett. ${p2} | Target ${mac.kcal}kcal (P:${mac.prot}g C:${mac.carb}g F:${mac.fat}g). Rispondi in italiano. Breve e motivante.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,system:sys,messages:ST.chatHistory.slice(-10)})});
    const d=await r.json();
    ST.chatHistory.push({role:'assistant',content:d.content?.[0]?.text||'Errore risposta.'});
  }catch{ST.chatHistory.push({role:'assistant',content:'AI non disponibile.'});}
  ST.chatLoading=false;await saveU();render();
  setTimeout(()=>{const c=el('chatArea');if(c)c.scrollTop=c.scrollHeight;},80);
}
function clearChat(){if(confirm('Cancellare chat?')){ST.chatHistory=[];save();}}
function copyLink(){const url=window.location.href.split('?')[0];navigator.clipboard?navigator.clipboard.writeText(url).then(()=>alert('✅ Link copiato!')):alert(url);}
function shareViaEmail(){const url=window.location.href.split('?')[0];const b=encodeURIComponent(`Ciao! Unisciti a FitTracker PRO:\n${url}`);window.location.href=`mailto:?subject=${encodeURIComponent('FitTracker PRO')}&body=${b}`;}

function svg(data,key,col,H,goal){
  if(data.length<2) return`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut)">Aggiungi almeno 2 dati per il grafico</div>`;
  const W=320,pl=28,pr=10,pt=8,pb=18;
  const vals=data.map(d=>d[key]||d.v||0);const allV=goal?[...vals,goal]:vals;
  const mn=Math.min(...allV)*.97,mx=Math.max(...allV)*1.03;
  const xs=i=>pl+(i/(data.length-1))*(W-pl-pr);
  const ys=v=>H-pb-((v-mn)/(mx-mn))*(H-pt-pb);
  const line=data.map((d,i)=>`${i===0?'M':'L'}${xs(i).toFixed(1)},${ys(d[key]||d.v||0).toFixed(1)}`).join(' ');
  const n=data.length-1;
  return`<svg width="100%" height="${H+4}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible"> ${goal?`<line x1="${pl}" y1="${ys(goal)}" x2="${W-pr}" y2="${ys(goal)}" stroke="${col}" stroke-width="1" stroke-dasharray="5 4" opacity=".45"/> <text x="${W-pr}" y="${ys(goal)-4}" fill="${col}" font-size="9" text-anchor="end" opacity=".7">obiettivo</text>`:''} <path d="${line} L${xs(n)},${H-pb} L${xs(0)},${H-pb}Z" fill="${col}" opacity=".07"/> <path d="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/> ${data.map((d,i)=>`<circle cx="${xs(i)}" cy="${ys(d[key]||d.v||0)}" r="3.5" fill="var(--card)" stroke="${col}" stroke-width="2.5"/>`).join('')} <text x="${pl-4}" y="${ys(mn)+4}" fill="var(--mut)" font-size="9" text-anchor="end">${mn.toFixed(0)}</text> <text x="${pl-4}" y="${ys(mx)+4}" fill="var(--mut)" font-size="9" text-anchor="end">${mx.toFixed(0)}</text> </svg>`;
}

// RENDER UI
// ══════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('app');
  if(!AU.user){renderAuth(root);return;}
  const sx=AU.profile?.sx||'m';
  const ht=AU.profile?.ht||170,ag=AU.profile?.ag||25;
  const pWeek=pwk(ST.programStart);
  let cW=ST.h.length?ST.h[ST.h.length-1].w:0;
  const wEntry=ST.h.find(x=>x.d===currentDateStr);if(wEntry) cW=wEntry.w;
  const an=ST.p?analyze(ST.h,ST.p):{status:'new',msg:'',col:'var(--mut)',calAdj:0,cardioAdj:0,alert:null};
  const mac=ST.p?calcMacros(cW,ht,ag,sx,ST.p,ST.p.sessions||3,an):{kcal:1700,prot:120,carb:150,fat:50,bmr:0,tdee:0,cardioLevel:1};
  const theme=ST.p?.t==='cut'?'var(--acc)':'var(--blu)';
  const dOfW=(new Date(currentDateStr).getDay()+6)%7;
  const weekPlan=ST.p?buildWeeklyPlan(ST.p.sessions||3,ST.p,sx):[];
  const todayWoId=weekPlan[dOfW];
  const todayLog=ST.wLog.find(w=>w.d===currentDateStr);

  if(ST.aWo&&ST.p){
    const wo=getWo(),ex=getEx();
    const totalSets=parseInt(ex.sets)||3;
    const isTimeExercise=ex.t==='isometric'||(ex.reps&&ex.reps.toString().includes('s'));
    const sug=getSuggest(ex.id,ST.wHistory||{});

    if(ST.woPhase==='rest'){
      root.innerHTML=`<div class="wo"><div class="wo-head"><div><div style="font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1px;text-transform:uppercase;">${wo.name} · Es. ${ST.step+1}/${wo.exercises.length}</div><div class="bebas" style="font-size:18px;color:var(--blu);">⏸ RECUPERO — SERIE ${ST.currentSet}/${totalSets}</div></div><button class="btn-s btn-action" onclick="skipRest()">SALTA ▸</button></div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
        <div class="tmr-ring tmr-ring-rest"><div id="tmrUI" style="font-size:78px;font-family:monospace;font-weight:700;color:var(--blu);">${ST.tmr}</div><div style="font-size:12px;color:var(--mut);">secondi</div></div>
        <div style="margin-top:24px;text-align:center;"><div style="font-size:13px;color:var(--mut);margin-bottom:6px;">PROSSIMA SERIE:</div><div class="bebas" style="font-size:28px;color:var(--text);">SERIE ${ST.currentSet+1} DI ${totalSets}</div><div style="font-size:14px;color:${wo.col||'var(--acc)'};margin-top:4px;font-weight:700;">${ex.name}</div></div>
        <div style="display:flex;gap:10px;margin-top:20px;">${Array(totalSets).fill(0).map((_,i)=>`<div class="set-dot ${i<ST.currentSet?'done':i===ST.currentSet?'current':''}"></div>`).join('')}</div>
      </div>
      <div style="padding:14px;border-top:1px solid var(--bord);"><button class="btn btn-action" style="height:60px;font-size:18px;" onclick="skipRest()">⏭ SALTA RECUPERO</button></div></div>`;return;
    }

    if(ST.woPhase==='exercise_done'){
      const isLastEx=ST.step>=wo.exercises.length-1;
      const nextEx=!isLastEx?wo.exercises[ST.step+1]:null;
      root.innerHTML=`<div class="wo"><div class="wo-head"><div><div style="font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1px;text-transform:uppercase;">${wo.name} · Es. ${ST.step+1}/${wo.exercises.length}</div><div class="bebas" style="font-size:18px;color:var(--acc);">✅ COMPLETATO!</div></div><button class="btn-s btn-action" onclick="closeWo()">✕ ESCI</button></div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
        <div style="font-size:48px;margin-bottom:12px;">💪</div><div class="bebas" style="font-size:32px;color:var(--acc);line-height:1;margin-bottom:6px;">${ex.name.split('—')[0].trim()}</div><div style="font-size:14px;color:var(--mut);margin-bottom:20px;">${totalSets} serie completate</div>
        <div style="display:flex;gap:10px;margin-bottom:28px;">${Array(totalSets).fill(0).map(()=>'<div class="set-dot done"></div>').join('')}</div>
        ${isLastEx?`<div class="card" style="width:100%;padding:20px;text-align:center;"><div class="bebas" style="font-size:28px;color:var(--acc);margin-bottom:4px;">🏆 ALLENAMENTO FINITO!</div></div>`:`<div class="card" style="width:100%;padding:16px;"><div style="font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:700;letter-spacing:1px;">PROSSIMO ESERCIZIO</div><div class="bebas" style="font-size:22px;color:var(--text);">${nextEx?.name||''}</div></div>`}
      </div>
      <div style="padding:14px;border-top:1px solid var(--bord);"><button class="btn" style="height:68px;font-size:22px;background:${isLastEx?'var(--gre)':wo.col||'var(--acc)'};" onclick="advanceExercise()">${isLastEx?'🏁 SALVA E TERMINA':'➡️ PROSSIMO'}</button></div></div>`;return;
    }

    const isActive=ST.woPhase==='active';
    root.innerHTML=`<div class="wo"><div class="wo-head"><div><div style="font-size:10px;color:var(--mut);font-weight:700;letter-spacing:1px;text-transform:uppercase;">${wo.name} · Es. ${ST.step+1}/${wo.exercises.length}</div><div class="bebas" style="font-size:20px;color:${wo.col||theme};">${ex.name}</div></div><button class="btn-s btn-action" onclick="closeWo()">✕ ESCI</button></div>
    <div class="bw" style="height:4px;border-radius:0;"><div class="bf" style="width:${((ST.step)/(wo.exercises.length)*100).toFixed(0)}%;height:4px;background:${wo.col||theme};border-radius:0;"></div></div>
    <div style="padding:16px;flex:1;overflow-y:auto;padding-bottom:100px;">
      <div style="background:${isActive?'rgba(74,222,128,.07)':'rgba(197,241,53,.05)'};border:1.5px solid ${isActive?'var(--gre)':wo.col||'var(--acc)'};border-radius:14px;padding:18px;margin-bottom:14px;text-align:center;box-shadow:${isActive?'0 0 20px rgba(74,222,128,0.2)':'none'};transition:0.3s;">
        <div style="font-size:12px;color:var(--mut);font-weight:700;letter-spacing:2px;margin-bottom:6px;">${isActive?'🟢 IN CORSO':'PROSSIMA SERIE'}</div>
        <div class="bebas" style="font-size:52px;line-height:1;color:${isActive?'var(--gre)':wo.col||'var(--acc)'};">${ST.currentSet+1}<span style="font-size:20px;color:var(--mut);"> / ${totalSets}</span></div>
        <div class="bebas" style="font-size:28px;color:var(--text);margin-top:4px;">${ex.reps} <span style="font-size:14px;color:var(--mut);">reps${isTimeExercise?' (o sec)':''}</span></div>
        ${ex.rest?`<div style="font-size:12px;color:var(--blu);margin-top:6px;">⏱ Riposo dopo: ${ex.rest}s</div>`:''}
        ${isActive?`<div style="margin-top:10px;padding:8px 16px;background:rgba(74,222,128,.1);border-radius:8px;display:inline-block;"><span style="font-size:11px;color:var(--gre);font-weight:700;">TEMPO: </span><span id="setTmrUI" style="font-family:monospace;font-size:18px;font-weight:700;color:var(--gre);">00:00</span></div>`:''}
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;">${Array(totalSets).fill(0).map((_,i)=>`<div class="set-dot ${i<ST.currentSet?'done':i===ST.currentSet?'current':''}"></div>`).join('')}</div>
      <div class="card" style="padding:16px;margin-bottom:10px;"><div class="lbl" style="margin-bottom:10px;">📋 ESECUZIONE:</div>${(ex.steps||[]).map((s,i)=>`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;"><div class="step-n">${i+1}</div><div style="font-size:13px;line-height:1.5;color:var(--text);padding-top:2px;">${s}</div></div>`).join('')}</div>
      ${(ex.cues||[]).length?`<div style="margin-bottom:12px;"><div class="lbl">💡 TIPS:</div>${ex.cues.map(c=>`<div class="cue-box">${c}</div>`).join('')}</div>`:''}
      <div class="card" style="padding:14px;margin-bottom:10px;"><div class="r" style="margin-bottom:8px;"><div><div class="lbl" style="margin-bottom:2px;">PESO USATO (KG)</div><div style="font-size:11px;color:var(--mut);">${sug.hint}</div></div>${sug.kg?`<div class="bebas" style="font-size:26px;color:${theme};">${sug.kg}kg</div>`:''}</div><input type="number" id="wkW" placeholder="${sug.kg||'Es. 12'}" step=".5" style="margin:0;font-size:24px;font-weight:700;text-align:center;"></div>
      <button class="btn btn-action" style="font-size:14px;width:100%;" onclick="openSwap('${ex.slot||''}')">🔄 CAMBIA ESERCIZIO</button>
    </div>
    <div style="position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--bord);padding:14px;">${!isActive?`<button class="btn btn-gre" style="height:72px;font-size:24px;" onclick="startSet()">▶ INIZIA SERIE ${ST.currentSet+1}/${totalSets}</button>`:`<button class="btn" style="height:72px;font-size:22px;" onclick="completeSet()">✅ SERIE COMPLETATA</button>`}</div></div>`;return;
  }

  const sheetH=ST.sheet==='swap'&&ST.sheetData?`<div class="sh-ov" onclick="if(event.target===this)closeSheet()"><div class="sh"><div class="sh-h"></div><div class="bebas" style="font-size:22px;margin-bottom:4px;">🔄 CAMBIA ESERCIZIO</div><div style="font-size:12px;color:var(--mut);margin-bottom:14px;">Stessa area muscolare</div>${ST.sheetData.alts.map(alt=>{const cur=alt.id===ST.sheetData.curId;return`<div onclick="swapEx('${ST.sheetData.slot}','${alt.id}')" style="cursor:pointer;padding:14px;border-radius:12px;border:1.5px solid ${cur?'var(--acc)':'var(--bord)'};background:${cur?'rgba(197,241,53,.08)':'var(--surf)'};margin-bottom:7px;transition:.15s;"><div class="r"><div><div style="font-weight:700;font-size:14px;color:${cur?'var(--acc)':'var(--text)'};">${alt.name||alt.id}</div></div>${cur?`<span style="color:var(--acc);font-size:12px;font-weight:700;">✓ ATTUALE</span>`:''}</div></div>`;}).join('')}<button class="btn btn-action" style="margin-top:12px; width:100%; padding:12px;" onclick="closeSheet()">ANNULLA</button></div></div>`:'';

  let H=`<div class="tnav">
    <div class="ni ${ST.tab==='home'?'on':''}" onclick="ST.tab='home';render()"><span class="ic">🏠</span>HOME</div>
    <div class="ni ${ST.tab==='work'?'on':''}" onclick="ST.tab='work';render()"><span class="ic">🏋️</span>SCHEDE</div>
    <div class="ni ${ST.tab==='diet'?'on':''}" onclick="ST.tab='diet';render()"><span class="ic">🥗</span>DIETA</div>
    <div class="ni ${ST.tab==='body'?'on':''}" onclick="ST.tab='body';render()"><span class="ic">📊</span>DATI</div>
    <div class="ni ${ST.tab==='coach'?'on':''}" onclick="ST.tab='coach';render()"><span class="ic">🤖</span>AI</div>
    <div class="ni ${ST.tab==='set'?'on':''}" onclick="ST.tab='set';render()"><span class="ic">⚙️</span>CONFIG.</div>
  </div>
  <div style="position:fixed;top:48px;left:0;width:100%;background:rgba(9,9,11,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--bord);z-index:900;display:flex;justify-content:center;align-items:center;padding:10px;">
    <input type="date" value="${currentDateStr}" max="${getToday()}" onchange="changeCurrentDate(this.value)" style="width:auto;margin:0;padding:6px 12px;font-size:15px;border:1.5px solid var(--acc);border-radius:8px;color:var(--acc);background:var(--surf);font-weight:bold;outline:none;cursor:pointer;">
    <span style="font-size:12px;font-weight:700;color:var(--mut);margin-left:12px;letter-spacing:1px;">${currentDateStr===getToday()?'OGGI':'STORICO'}</span>
  </div>
  <div class="content" style="padding-top:105px;"><div class="wrap">`;

  if(!ST.p){
    H+=renderSetup();H+=`</div></div>`;
    root.innerHTML=H+sheetH;return;
  }

  if(ST.tab==='home') H+=renderHome(currentDateStr,cW,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='work') H+=renderWork(currentDateStr,mac,an,theme,sx,pWeek,weekPlan,dOfW,todayWoId,todayLog);
  else if(ST.tab==='diet') H+=renderDiet(currentDateStr,mac,an,sx);
  else if(ST.tab==='body') H+=renderBody(cW,mac,theme,pWeek,sx);
  else if(ST.tab==='coach') H+=renderCoach();
  else if(ST.tab==='set') H+=renderSettings(mac);

  H+=`</div></div>`;root.innerHTML=H+sheetH;
  if(ST.tab==='coach') setTimeout(()=>{const c=el('chatArea');if(c)c.scrollTop=c.scrollHeight;},50);
}

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════
async function bootApp(){
  try {
    const saved=window.SS.get();
    if(saved){
      AU.user=saved;
      const data=await window.DB.g('ft_u_'+saved);
      if(data) Object.assign(ST,{...defST(),...data});
      const reg=(await window.DB.g('ft_reg'))||[];
      AU.profile=reg.find(u=>u.un===saved)||{sx:'m',ht:170,ag:25};
      if(!ST.p) ST.tab = 'home';
    }
  } catch(e) {
    console.error("Boot Error", e);
  } finally {
    render();
  }
}

let _initAttempts=0;
const _startCheck=setInterval(()=>{
  _initAttempts++;
  if(window.DB && window.SS){
    clearInterval(_startCheck);
    bootApp();
  } else if(_initAttempts>60){
    clearInterval(_startCheck);
    alert('Impossibile connettersi a Firebase. Ricarica la pagina.');
  }
},100);
